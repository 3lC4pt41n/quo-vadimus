<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quo Vadimus — Wirksystem-Karte</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa0aa; --line:#2a2f3a;
    --belegt:#3ea66b; --plausibel:#d49a2a; --umstritten:#9b6bd6; --spekulativ:#c0564f;
	    --focus-glow:rgba(255,255,255,.38); --loop-tint:#e05a5a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-size:17px;margin:0;font-weight:650;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:12.5px;flex:1}
  .langbtn{align-self:center;background:#222732;color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:4px 12px;font-size:12px;font-weight:650;cursor:pointer}
  .langbtn:hover{background:#2a3140}
  .vselect{align-self:center;background:#222732;color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:4px 28px 4px 10px;font-size:12px;font-weight:650;cursor:pointer}
  .vselect:hover,.vselect:focus{background:#2a3140;outline:none}
  #wrap{display:flex;height:calc(100% - 53px)}
  #stage{flex:1;position:relative;overflow:hidden;cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block;user-select:none}
  .nodeBox,.edge,.ehit,.polg{transition:opacity .18s, filter .18s}
  .nodeBox{cursor:pointer}
  .nodeBox rect{transition:filter .15s, stroke-width .15s}
  .nodeBox:hover rect{filter:brightness(1.18)}
  .dim{opacity:.12}
	  .nodeBox[data-degree-tier="mid"]{filter:drop-shadow(0 0 4px rgba(232,234,237,.16))}
	  .nodeBox[data-degree-tier="hub"]{filter:drop-shadow(0 0 8px rgba(232,234,237,.28))}
	  .nodeBox.hot,.edge.hot,.polg.hot{filter:drop-shadow(0 0 7px var(--focus-glow))}
	  .edge.loopTint{stroke:var(--loop-tint)}
	  .polg.loopTint circle{stroke:var(--loop-tint)}
	  .polg.loopTint text{fill:var(--loop-tint)}
  .nodeBox.hot rect{stroke-width:3.8}
  .nlabel{font-size:11.5px;line-height:1.18;color:var(--ink);padding:6px 8px;
    height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:550;overflow:hidden}
  .nodeBox[data-degree-tier="mid"] .nlabel{font-weight:620}
  .nodeBox[data-degree-tier="hub"] .nlabel{font-weight:720}
  .badge{font-size:11px;font-weight:700}
  .edge{fill:none;stroke-width:2}
  .edge.hot{stroke-width:3.4}
  .ehit{fill:none;stroke:transparent;stroke-width:16;cursor:pointer}
  .polg text{font-size:11px;font-weight:700}
  #side{width:330px;border-left:1px solid var(--line);background:var(--panel);
    padding:16px 18px;overflow-y:auto;font-size:13px}
  #side h2{font-size:13px;margin:0 0 4px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:650}
  #side .title{font-size:16px;font-weight:650;margin:2px 0 10px}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin:0 6px 6px 0}
  .traceActions{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 10px}
  .traceBtn{background:#222732;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:4px 8px;font-size:11px;font-weight:650;cursor:pointer}
  .traceBtn:hover,.traceBtn.active{background:#2a3140;border-color:#7fb3ff}
  .traceSummary{color:var(--muted);font-size:11.5px;margin:-3px 0 10px}
  .row{padding:10px 0;border-top:1px solid var(--line)}
  .row .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .mech{font-style:italic}
  .legend{position:absolute;left:14px;bottom:14px;background:rgba(23,26,33,.92);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted);max-width:250px}
  .legend b{color:var(--ink);font-weight:600}
  .legend .li{display:flex;align-items:center;gap:7px;margin:3px 0}
	  .filterPanel{position:absolute;left:282px;bottom:14px;background:rgba(23,26,33,.92);
	    border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted);
	    max-width:min(520px,calc(100% - 296px))}
	  .filterPanel b{color:var(--ink);font-weight:600}
	  .filterPanel .fg{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 8px}
	  .loopControl{border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px}
	  .loopControl select{width:100%;margin-top:5px;background:#1d222c;color:var(--ink);border:1px solid var(--line);
	    border-radius:6px;padding:4px 8px;font-size:11px}
	  .loopKey{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
	  .loopDot{width:9px;height:9px;border-radius:50%;display:inline-block}
	  .routeControl{border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px}
	  .routeButtons{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
	  .routeBtn{background:#222732;color:var(--ink);border:1px solid var(--line);
	    border-radius:6px;padding:4px 8px;font-size:11px;font-weight:650;cursor:pointer}
	  .routeBtn:hover,.routeBtn.active{background:#2a3140;border-color:var(--route-color);
	    box-shadow:inset 0 0 0 1px var(--route-color)}
	  .simControl{border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px}
	  .simControl input[type="range"]{width:100%;accent-color:#7fb3ff;margin:7px 0 2px}
	  .simScale{display:flex;justify-content:space-between;gap:8px;font-size:10.5px}
	  .simMode{color:var(--muted)}
	  .simMode.active{color:var(--ink);font-weight:700}
	  .simHint{font-size:10.5px;line-height:1.35;color:var(--muted);margin-top:6px}
	  .simCounts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
	  .simPill{border:1px solid var(--line);border-radius:999px;padding:2px 7px;background:#1d222c}
	  .simPill.good{border-color:#78c86f;color:#b9e6b2}
	  .simPill.bad{border-color:#e05a5a;color:#f1b2b2}
	  .simPill.conflict{border-color:#c9b458;color:#eadf9b}
	  .nodeBox.simGood rect{fill:#173024;stroke:#78c86f}
	  .nodeBox.simBad rect{fill:#321b1b;stroke:#e05a5a}
	  .nodeBox.simConflict rect{fill:url(#simConflictPattern);stroke:#c9b458}
	  .edge.routeStep{stroke-width:4.6}
	  .nodeBox.routeStep rect{stroke-width:4.4}
	  .polg.routeStep circle{stroke-width:2.6}
	  .routeStep{animation:routePulse .7s ease-in-out}
	  @keyframes routePulse{0%,100%{filter:drop-shadow(0 0 3px var(--focus-glow))}
	    50%{filter:drop-shadow(0 0 13px var(--focus-glow))}}
	  @media (prefers-reduced-motion:reduce){.routeStep{animation:none}}
  .filterPanel label{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);
    border-radius:6px;padding:3px 6px;background:#1d222c;cursor:pointer;white-space:nowrap}
  .filterPanel input{margin:0;accent-color:#7fb3ff}
  .filterPanel button{background:#222732;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:3px 8px;font-size:11px;font-weight:650;cursor:pointer}
  .filterPanel button:hover{background:#2a3140}
  .nodeBox.filteredOut:not(.dim){opacity:.24}
  .mapTools{position:absolute;right:14px;top:14px;background:rgba(23,26,33,.92);
    border:1px solid var(--line);border-radius:10px;padding:8px;display:flex;gap:6px;align-items:center;
    max-width:min(390px,calc(100% - 28px));z-index:2}
  .mapTools input{width:210px;min-width:0;background:#1d222c;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:5px 8px;font-size:11px}
  .mapTools button{background:#222732;color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:5px 8px;font-size:11px;font-weight:650;cursor:pointer;white-space:nowrap}
  .mapTools button:hover{background:#2a3140}
  .searchStatus{color:var(--muted);font-size:10.5px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .minimap{position:absolute;right:14px;top:62px;width:180px;height:118px;background:rgba(23,26,33,.92);
    border:1px solid var(--line);border-radius:10px;padding:7px;z-index:2}
  .minimap svg{width:100%;height:100%;display:block}
  .miniNode{fill:#3a414e;opacity:.75}
  .miniNode.hot{fill:#e8eaed;opacity:1}
  .miniView{fill:rgba(127,179,255,.12);stroke:#7fb3ff;stroke-width:2}
  @media (max-width:1000px){.filterPanel{left:14px;top:14px;bottom:auto;max-width:calc(100% - 28px);max-height:45%;overflow:auto}}
  @media (max-width:1000px){.mapTools{right:14px;bottom:14px;top:auto;max-width:calc(100% - 28px)}
    .mapTools input{width:150px}.minimap{right:14px;bottom:64px;top:auto;width:150px;height:98px}}
  .sw{width:22px;height:0;border-top-width:3px;border-top-style:solid;display:inline-block}
  .empty{color:var(--muted);font-style:italic;margin-top:8px}
  .hint{color:var(--muted);font-size:11px;margin-top:14px;line-height:1.5}
  kbd{background:#222732;border:1px solid var(--line);border-radius:4px;padding:0 5px;font-size:10.5px}
</style>
</head>
<body>
<header>
  <h1>Quo Vadimus</h1>
  <select class="vselect" aria-label="Version auswählen" onchange="if(this.value) location.href=this.value">
    <option value="quo-vadimus.html" selected>V0.5 aktuell</option>
    <option value="versions/v0.4/quo-vadimus.html">V0.4</option>
    <option value="versions/v0.3/quo-vadimus.html">V0.3</option>
    <option value="versions/v0.2/quo-vadimus.html">V0.2</option>
    <option value="versions/v0.1/quo-vadimus.html">V0.1</option>
    <option value="versions/v0/quo-vadimus.html">V0</option>
  </select>
  <span class="sub" id="subtitle"></span>
  <button class="langbtn" id="langbtn" onclick="toggleLang()"></button>
</header>
<div id="wrap">
  <div id="stage">
    <svg id="svg"></svg>
    <div class="mapTools" id="mapTools"></div>
    <div class="minimap"><svg id="minimapSvg"></svg></div>
    <div class="legend" id="legend"></div>
    <div class="filterPanel" id="filters"></div>
  </div>
  <div id="side">
    <h2 id="detailHead">Detail</h2>
    <div id="detail"></div>
  </div>
</div>

<script>
// ====================================================================
//  WIRKSYSTEM-DATEN — bilingual (de = Felder label/note/mech, en = le/ne/me)
//  type: start|branch|convergence|outcome|tipping|locked|bright|premise
//  conf: belegt|plausibel|umstritten|spekulativ   pol: "+"|"-"   loop: true
//  Achsen: C=Präkarisierung↑ SEC=Sicherheit↑ P=Enge↑ DIST=Verteilung↑ LK=Riegel↑ GROW=Wachstum↑ ECO=Degeneration↑ FS=Budget-Enge↑
// ====================================================================
const NODES = {
  A:  {x:470,y:30,  type:"start",       label:"KI-Fähigkeit bei kognitiver Routinearbeit steigt schnell", le:"AI capability at cognitive routine work rises fast", chain:1, note:"Startbedingung von Kette 1.", ne:"Starting condition of chain 1."},
  B:  {x:470,y:150, type:"branch",      label:"Viele Mid-Level-/Office-Jobs werden obsolet", le:"Many mid-level / office jobs become obsolete", chain:1, note:"Verzweigung: verschwinden Jobs netto, oder verschieben sie sich nur?", ne:"Branch: do jobs vanish net, or merely shift?"},
  Bs: {x:215,y:280, type:"outcome",     label:"Verschiebung in den Service-Sektor", le:"Shift into the service sector", chain:1},
  Bm: {x:470,y:280, type:"outcome",     label:"Verschiebung ins Monitoring der KI-Systeme", le:"Shift into monitoring the AI systems", chain:1},
  Bw: {x:730,y:280, type:"outcome",     label:"Netto-Wegfall von Stellen", le:"Net loss of positions", chain:1},
  Au: {x:840,y:410, type:"bright",      label:"Aufwertung: knappe, gut bezahlte Aufsichtsrollen", le:"Upgrading: scarce, well-paid oversight roles", chain:1, note:"Ambivalent: knapp → konzentriert Gewinne (→DIST−); breit qualifiziert (via EDU) → Verteilung. Kein Endknoten mehr.", ne:"Ambivalent: scarce → concentrates gains (→DIST−); broadly trained (via EDU) → distribution. No longer a dead end."},
  C:  {x:470,y:410, type:"convergence", label:"Präkarisierung vieler Angestellter und Arbeiter", le:"Precarization of many salaried employees and workers", chain:1, note:"Konvergenzknoten: Service, Wegfall, Steuer-Kette, Fiskal-Kette und das Verteilungstor laufen hier zusammen; zugleich Verzweigung (D vs. Dp). Pointe: das historisch NEUE ist, dass die Welle die ANGESTELLTE Mitte (Sachbearbeitung/Office) erfasst — der Einstieg. Über den Service-Pfad (Bs→C) landen hier aber auch Menschen in Arbeiter-typischer Prekarität.", ne:"Convergence node: service, redundancy, the tax chain, the fiscal chain and the distribution gate all meet here; also a branch (D vs. Dp). Point: the historically NEW thing is that the wave hits the SALARIED middle (clerical/office) — the entry. Via the service path (Bs→C) people also land in worker-type precarity."},
  Dp: {x:730,y:540, type:"locked",      label:"Umverteilung/Absicherung → Stabilisierung", le:"Redistribution/protection → stabilization", chain:1, note:"Der helle Pfad. Aus DREI Richtungen verriegelt: Wettbewerb (LK), Steuerwettbewerb, fehlendes Geld (FS). Würde, wenn er zündete, C dämpfen. V0.1: Die nordische Variante überlebt LK, weil sie die unbewegliche Basis besteuert (breite Löhne + MwSt statt Kapital — Schweden strich Erbschaft- und Vermögensteuer). Ihr Treibstoff ist aber die breite Lohnbasis → neuer vierter Riegel C→FS. Und neu: der Bismarck-Thermostat D→Dp.", ne:"The bright path. Locked from THREE directions: competition (LK), tax competition, lack of money (FS). Would, if it fired, dampen C. V0.1: The Nordic variant survives LK by taxing the immobile base (broad wages + VAT instead of capital — Sweden scrapped inheritance and wealth taxes). But its fuel is the broad wage base → new fourth lock C→FS. Also new: the Bismarck thermostat D→Dp."},
  D:  {x:470,y:540, type:"outcome",     label:"Radikalisierung der Ränder (links & rechts)", le:"Radicalization of the fringes (left & right)", chain:1, note:"Dieselbe Präkarisierung, zwei Deutungen: „die da oben/das Kapital“ (links) vs. „Migranten/Eliten/Brüssel“ (rechts).", ne:"The same precarization, two readings: 'those at the top/capital' (left) vs. 'migrants/elites/Brussels' (right)."},
  E:  {x:470,y:680, type:"outcome",     label:"Renationalisierung — Abkehr von Europa", le:"Renationalization — turning away from Europe", chain:1, note:"Anti-supranationale Stoßrichtung ist Programmkern der Rechtsparteien — Konvergenz über viele Akteure.", ne:"Anti-supranational thrust is the programmatic core of the right parties — convergence across many actors."},
  T1: {x:30, y:410, type:"tipping",     label:"★ Kipp: Anteil Aufwertung vs. Service/Wegfall", le:"★ Tipping: share of upgrading vs. service/redundancy", chain:1, note:"Hoher Aufwertungsanteil → weniger Präkarisierung.", ne:"A high upgrading share lowers precarization."},
  T2: {x:30, y:560, type:"tipping",     label:"★ Kipp: Absicherung OHNE Wettbewerbsverlust möglich?", le:"★ Tipping: protection possible WITHOUT losing competitiveness?", chain:1, note:"Fällt mit T3/DIST zu EINER Frage zusammen: lässt sich Absicherung finanzieren, ohne den Standort zu fressen?", ne:"Collapses with T3/DIST into one question: can protection be financed without eating the location's competitiveness?"},

  S2:  {x:1180,y:30,  type:"start",       label:"Faktor-Fehlbepreisung: Arbeit hoch besteuert, Energie subventioniert, Ressourcen niedrig", le:"Factor mispricing: labor taxed high, energy subsidized, resources taxed low", chain:2, note:"Startbedingung Kette 2 — unabhängig.", ne:"Starting condition chain 2 — independent."},
  L:   {x:1180,y:165, type:"outcome",     label:"Arbeit wird teuer (hoher Steuerkeil)", le:"Labor becomes expensive (high tax wedge)", chain:2},
  J:   {x:1040,y:300, type:"outcome",     label:"Weniger Arbeitsplätze entstehen", le:"Fewer jobs are created", chain:2, note:"Läuft in den Konvergenzknoten C.", ne:"Runs into the convergence node C."},
  R:   {x:1320,y:300, type:"outcome",     label:"Ressourcenverschwendung — externe Kosten unbepreist", le:"Resource waste — external costs unpriced", chain:2, note:"Sammelt aus drei Quellen: Steuer, Geopolitik, Wachstum.", ne:"Collects from three sources: tax, geopolitics, growth."},
  LK:  {x:1180,y:445, type:"convergence", label:"Standortwettbewerb verriegelt nationale Alleingänge", le:"Locational competition bolts shut national go-it-alone moves", chain:2, note:"META-KONVERGENZ: derselbe Riegel blockiert Umverteilung (Dp) UND drückt die Verteilung (DIST−). Robustester Attraktor.", ne:"META-CONVERGENCE: the same lock blocks redistribution (Dp) AND pushes distribution down (DIST−). The most robust attractor."},
  T3:  {x:1180,y:600, type:"tipping",     label:"★ Kipp: supranationale Koordination — ja/nein?", le:"★ Tipping: supranational coordination — yes/no?", chain:2, note:"Öffnet oder hält den Riegel. Kette 1s Renationalisierung (E) und die Machtordnung (ORD) drücken sie auf „Nein“. Stand 6/2026: globale Mindeststeuer in Kraft (erste GloBE-Filings), USA per Side-by-Side ausgenommen — die Koordination verbog sich, kollabierte aber nicht. CBAM seit 1.1.2026 scharf: Externalitäten-Bepreisung ohne Standortverlust ist demonstriert.", ne:"Opens or holds the lock. Chain 1's renationalization (E) and the power order (ORD) push it to 'no'. As of 6/2026: global minimum tax in force (first GloBE filings), US exempted via side-by-side — coordination bent but did not collapse. CBAM live since 1 Jan 2026: pricing externalities without losing the location is demonstrated."},

  P:   {x:560, y:850, type:"premise",  label:"Mensch = Organismus, gedeiht zuerst selbst — moralischer Kreis in konzentrischen Ringen (Ich→Familie→Community→Land→Welt)", le:"Human = organism, thrives itself first — moral circle in concentric rings (self→family→community→country→world)", chain:0, note:"PRÄMISSE / Substrat. Begründet C→D, E, ORD und warum die Riegel halten. Gegenkraft = kantischer Universal, konditional auf Sicherheit (SEC).", ne:"PREMISE / substrate. Grounds C→D, E, ORD and why the locks hold. Counterforce = Kantian universal, conditional on security (SEC)."},
  SEC: {x:150, y:720, type:"tipping",  label:"★ Wahrgenommene Sicherheit / Überfluss → Radius des moralischen Kreises", le:"★ Perceived security / abundance → radius of the moral circle", chain:0, note:"Regler UNTER der Politik. Hoch → Kreis weit (P sinkt). Gespeist (+) von Wachstum, Fortschritt, Verteilung; gesenkt (−) von Präkarisierung und Degeneration.", ne:"Regulator beneath the politics. High → wide circle (P falls). Fed (+) by growth, progress, distribution; lowered (−) by precarization and degeneration."},

  G:    {x:760, y:990,  type:"start",       label:"Rückkehr der Machtpolitik: Russland/Ukraine, „America first“, China/Taiwan, Aufrüstung, Musk/Mars", le:"Return of power politics: Russia/Ukraine, 'America first', China/Taiwan, rearmament, Musk/Mars", chain:3, note:"Startbedingung Kette 3 — unabhängig.", ne:"Starting condition chain 3 — independent."},
  BLOC: {x:340, y:1110, type:"bright",       label:"Äußere Bedrohung weitet den Kreis: „Europa als Block“ → Verteidigungsunion/Integration", le:"External threat widens the circle: 'Europe as a bloc' → defense union/integration", chain:3, note:"Heller Gegen-Fork — kann ebenso national zersplittern. Umstritten. Stand 6/2026: SAFE (€150 Mrd, 18 Staaten gezeichnet) und Readiness 2030 laufen — der Fork feuert real.", ne:"Bright counter-fork — could equally splinter nationally. Contested. As of 6/2026: SAFE (€150bn, 18 member states signed up) and Readiness 2030 are under way — the fork is firing for real."},
  ORD:  {x:640, y:1110, type:"convergence",  label:"Ordnung verschiebt sich: regelbasiert → machtbasiert", le:"Order shifts: rule-based → power-based", chain:3, note:"Dreifach: senkt T3 (Koordination unmöglich), drückt DIST (Stärke statt Regeln → Kaperung), = Prämisse P auf Staatsebene, öffnet die Systemfrage.", ne:"Threefold: lowers T3 (coordination impossible), pushes DIST (strength over rules → capture), = premise P at state scale, opens the system question."},
  RES:  {x:980, y:1110, type:"outcome",      label:"Ressourcen-Fehlallokation: Rüstung & Prestige statt nachhaltiger Entwicklung", le:"Resource misallocation: arms & prestige instead of sustainable development", chain:3, note:"Konvergiert mit der ökologischen Fehlbepreisung R.", ne:"Converges with the ecological mispricing R."},
  SYS:  {x:640, y:1245, type:"branch",       label:"Systemfrage: Demokratie vs. Autokratie (Partei / König / Geld)", le:"System question: democracy vs. autocracy (party / king / money)", chain:3, note:"Verzweigung des Regimetyps. Autokratie → Macht-/Vermögenskonzentration → Kaperung (→DIST−); Demokratie hält Verteilung offen. Wirkt direkt auf den Master-Schalter.", ne:"Branch of regime type. Autocracy → power/wealth concentration → capture (→DIST−); democracy keeps distribution open. Acts directly on the master switch."},

  S4:  {x:-340, y:520, type:"start",   label:"Zunehmende Staatsverschuldung", le:"Rising public debt", chain:4, note:"Startbedingung Kette 4 — unabhängig.", ne:"Starting condition chain 4 — independent."},
  WZ:  {x:-340, y:390, type:"outcome", label:"Wachstumszwang (Druck: g muss r schlagen)", le:"Growth imperative (pressure: g must beat r)", chain:4, note:"Der DRUCK aus den Schulden — nicht das Ergebnis. Begünstigt Kapital/Austerität → tendiert zur Kaperung (→DIST−).", ne:"The PRESSURE from debt — not the result. Favors capital/austerity → tends toward capture (→DIST−)."},
  GROW:{x:-110, y:470, type:"outcome", label:"Tatsächliches Wachstum (Ergebnis)", le:"Actual growth (outcome)", chain:4, note:"Getrennt vom Zwang: hängt an produktiver Schuld (INV) und Produktivitätsüberschuss (AUT). Erfüllt → SEC↑, dämpft C; frisst aber Ressourcen (→R). Von Degeneration & Demografie gesenkt.", ne:"Separate from the imperative: depends on productive debt (INV) and the productivity surplus (AUT). If met → SEC↑, dampens C; but eats resources (→R). Lowered by degeneration & demographics."},
  FS:  {x:-340, y:660, type:"outcome", label:"Weniger fiskalischer Spielraum (Zinslast bindet Budget)", le:"Less fiscal room (interest burden binds the budget)", chain:4, note:"Dritter, unabhängiger Riegel am hellen Pfad Dp — diesmal: kein Geld.", ne:"Third, independent lock on the bright path Dp — this time: no money."},
  INV: {x:-590, y:520, type:"branch",  label:"Produktive Schuld (investieren) vs. konsumtive Schuld (alimentieren)", le:"Productive debt (investing) vs. consumptive debt (subsidizing)", chain:4, note:"Konkretester heller Fork: produktiv → Wachstum → Positivsumme → Ausweg. Konsumtiv → Last ohne Gegenwert.", ne:"Most concrete bright fork: productive → growth → positive-sum → exit. Consumptive → burden without return."},
  DEM: {x:-600, y:700, type:"start",   label:"Demografie: alternde, schrumpfende Erwerbsbevölkerung", le:"Demographics: aging, shrinking workforce", chain:7, note:"Unabhängige Kette UND Anti-Doom-Gegenkraft: treibt Schulden (S4↑) und senkt Wachstum (GROW−) — dämpft aber den Job-Wegfall (B−), weil Automation eine demografische Lücke füllt statt zu verdrängen.", ne:"Independent chain AND anti-doom counterforce: drives debt (S4↑) and lowers growth (GROW−) — but dampens job loss (B−), because automation fills a demographic gap instead of displacing."},

  ECO:  {x:1330, y:470, type:"convergence", label:"Ökologische Degeneration (Klima, Biodiversität, Degradation)", le:"Ecological degeneration (climate, biodiversity, degradation)", chain:5, note:"Kein Endpunkt, sondern MOTOR: speist drei Rückkopplungen — SEC↓, D (Klimamigration), GROW↓ (Kapitalzerstörung). Zweiter Treiber des Attraktors.", ne:"Not an endpoint but an ENGINE: feeds three feedbacks — SEC↓, D (climate migration), GROW↓ (capital destruction). The second driver of the attractor."},
  ECOc: {x:1580, y:470, type:"bright",       label:"Klima als gemeinsamer Feind → planetare Kooperation (weiter Kreis)", le:"Climate as common enemy → planetary cooperation (wide circle)", chain:5, note:"Heller Fork — asymmetrisch gebremst: Klima ist langsam/diffus → liest sich als Knappheit, nicht als akuter Feind.", ne:"Bright fork — asymmetrically braked: climate is slow/diffuse → reads as scarcity, not as an acute enemy."},

  SOZ:  {x:230, y:600, type:"convergence", label:"Soziale Erosion (Armutsgefühl, Obdachlosigkeit, Perspektivlosigkeit, Vandalismus, Kriminalität)", le:"Social erosion (felt poverty, homelessness, hopelessness, vandalism, crime)", chain:8, note:"SOZIALE EXTERNALITÄT — der Zwilling der ökologischen (ECO). Materialisiert die Präkarisierung im Alltag und spillt als Verfall/Kriminalität auf ALLE über. Armutsgefühl/Perspektivlosigkeit = subjektiver Kern (direkt niedriges SEC); Vandalismus/Kriminalität = die Externalität, die fremdes SEC senkt.", ne:"SOCIAL EXTERNALITY — the twin of the ecological one (ECO). Materializes precarization in daily life and spills over as decay/crime onto EVERYONE. Felt poverty/hopelessness = subjective core (directly low SEC); vandalism/crime = the externality that lowers others' SEC."},

  AUT:  {x:190,  y:30,  type:"bright",       label:"Automation → Produktivitätsüberschuss", le:"Automation → productivity surplus", chain:6, note:"JANUS-Gesicht von A. Speist den potenziellen Wohlstand (SURP) UND das tatsächliche Wachstum (GROW).", ne:"Janus face of A. Feeds both potential prosperity (SURP) and actual growth (GROW)."},
  EDU:  {x:-60,  y:30,  type:"bright",       label:"KI-Bildung: personalisierte Qualifizierung in der Breite", le:"AI education: personalized upskilling at scale", chain:6, note:"Hebt die Verteilung direkt (→DIST+) und kippt den Aufwertungspfad (→Au).", ne:"Raises distribution directly (→DIST+) and tips the upgrading path (→Au)."},
  MED:  {x:-310, y:30,  type:"bright",       label:"Technischer & medizinischer Fortschritt: Lebensqualität↑, Kosten↓", le:"Technical & medical progress: quality of life↑, costs↓", chain:6, note:"Hebt die Basis-Sicherheit direkt → SEC.", ne:"Raises baseline security directly → SEC."},
  SURP: {x:-310, y:165, type:"convergence",  label:"Potenzieller Überschuss: Produktivität + Wissen + Gesundheit", le:"Potential surplus: productivity + knowledge + health", chain:6, note:"Heller Konvergenzknoten — die Masse, die überhaupt verteilt werden kann. Erreicht SEC vor allem durch das Verteilungstor DIST — doch das Tor leckt (MED→SEC, AUT→SEC): Gebrauchswert diffundiert auch bei Kaperung der Geld-Einkommen (V0.1).", ne:"Bright convergence node — the mass that can be distributed at all. Reaches SEC mainly through the distribution gate DIST — but the gate leaks (MED→SEC, AUT→SEC): use-value diffuses even when money incomes are captured (V0.1)."},
  DIST: {x:-310, y:300, type:"tipping",      label:"★ Verteilungsgrad: breit verteilter vs. gekaperter Überschuss", le:"★ Degree of distribution: broadly distributed vs. captured surplus", chain:6, note:"DIE Master-Kipp-Variable, sitzt VOR SEC — jetzt verkabelt. Gesenkt (−) durch Riegel (LK), Machtordnung (ORD), Steuer-Fehlbepreisung (S2), konzentrierte Aufwertung (Au), Autokratie (SYS), Wachstumszwang (WZ). Gehoben (+) durch breite KI-Bildung (EDU) und den Überschuss (SURP). Hoch → SEC↑ → Utopie; niedrig → Überfluss OHNE Sicherheit → Dystopie. V0.1: Schleifen-Zensus — fast alle Zyklen der Karte sind selbstverstärkend → Bistabilität: dieselben Schleifen, die abwärts ziehen, rasten aufwärts ein. Neue Heber: Bürgerfonds (FUND), Belegschaftseigentum (OWN), Arbeitskräfteknappheit (VAC), dazu G (umstritten).", ne:"THE master tipping variable, sits BEFORE SEC — now wired. Lowered (−) by the lock (LK), power order (ORD), tax mispricing (S2), concentrated upgrading (Au), autocracy (SYS), growth imperative (WZ). Raised (+) by broad AI education (EDU) and the surplus (SURP). High → SEC↑ → utopia; low → abundance WITHOUT security → dystopia. V0.1: loop census — nearly all cycles in the map are self-reinforcing → bistability: the same loops that pull downward lock in upward. New levers: citizen fund (FUND), worker ownership (OWN), labor scarcity (VAC), plus G (contested)."},

  // ---- Empirische Mediatoren (Deep-Research-Memo, Beleg-Tags K01-K18) ----
  HOU:  {x:-120,y:880, type:"outcome", label:"Wohnkosten- & Wohnungsunsicherheit", le:"Housing cost & housing insecurity", chain:9, note:"MEDIATOR (Eurofound): Wohnkostenlast senkt SEC auch bei Beschäftigung und verstärkt die soziale Erosion. Erklärt, warum SEC selbst bei Wachstum fällt. Messbar über Housing-cost overburden.", ne:"MEDIATOR (Eurofound): housing-cost burden lowers SEC even when employed and amplifies social erosion. Explains why SEC falls even amid growth. Measurable via housing-cost overburden."},
  SPROT:{x:-360,y:880, type:"bright",  label:"Wirksamkeit sozialer Sicherung", le:"Effectiveness of social protection", chain:9, note:"Macht aus dem Wunsch nach staatlicher Hilfe einen messbaren Mechanismus: verlässliche Sicherung → weniger existenzielle Schocks → SEC. Gespeist vom fiskalischen Spielraum (FS).", ne:"Turns the wish for state help into a measurable mechanism: reliable protection → fewer existential shocks → SEC. Fed by fiscal room (FS)."},
  TRUST:{x:120, y:1000,type:"outcome", label:"Institutionelles Vertrauen", le:"Institutional trust", chain:9, note:"Beobachtbarer Proxy für das Substrat P: ökonomische Sicherheit → Vertrauen → weniger Nachfrage nach Abschottung/Populismus. Reduziert die Abhängigkeit von der unmessbaren Prämisse P (Guiso et al.).", ne:"Observable proxy for the substrate P: economic security → trust → less demand for closure/populism. Reduces dependence on the unmeasurable premise P (Guiso et al.)."},
  MPWR: {x:-620,y:300, type:"outcome", label:"Marktmacht & Konzentration (Markups, Lohnquote)", le:"Market power & concentration (markups, labor share)", chain:9, note:"Der ökonomische Capture-Kanal, der DIST bislang fehlte: steigende Markups & Superstar-Firmen drücken die Lohnquote → Überschuss wandert zu Kapital. Härtester Verteilungsbeleg (De Loecker; Autor).", ne:"The economic capture channel DIST lacked: rising markups & superstar firms depress the labor share → surplus shifts to capital. The hardest distributional evidence (De Loecker; Autor)."},
  PLAT: {x:-620,y:165, type:"outcome", label:"Plattform-Gatekeeper-Macht", le:"Platform gatekeeper power", chain:9, note:"Digitale Spezifikation von Marktmacht: Netzwerkeffekte, Datenakkumulation, Lock-in, Tipping → Gatekeeper. Speist MPWR.", ne:"Digital specification of market power: network effects, data accumulation, lock-in, tipping → gatekeepers. Feeds MPWR."},
  ADL:  {x:175, y:160, type:"bright",  label:"Erwachsenenlernen & Reskilling-Zugang", le:"Adult learning & reskilling access", chain:9, note:"Der im KI-/Demografie-Kontext entscheidende Bildungskanal — und ungleich verteilt: Höherqualifizierte nehmen weit häufiger teil. Breiter Zugang → breitere Diffusion (DIST↑), weniger Verdrängung (C↓).", ne:"The education channel that matters most under AI/demographics — and unequally distributed: the higher-skilled participate far more. Broad access → broader diffusion (DIST↑), less displacement (C↓)."},
  VAC:  {x:-850,y:560, type:"bright",  label:"Arbeitskräfteknappheit (offene Stellen)", le:"Labor scarcity (vacancies)", chain:9, note:"Operationalisiert die helle demografische Gabel: 2025 als Wendepunkt von Job- zu Arbeitskräftemangel. Technik füllt Lücken (C↓), Knappheit treibt Adoption (AUT↑) — aber kein „silver bullet“ (OECD).", ne:"Operationalizes the bright demographic fork: 2025 as the turning point from job shortage to labor shortage. Tech fills gaps (C↓), scarcity drives adoption (AUT↑) — but no “silver bullet” (OECD)."},

  // ---- V0.1: Reddit-Forks — Bürgerfonds & Wirtschaftsdemokratie ----
  CFT:  {x:-870,y:30,  type:"bright", chain:10, label:"Cashflow-Steuer: Automations-Rente abschöpfen, Personal im Inland abziehbar", le:"Cash flow tax: skim automation rents, domestic payroll deductible", note:"V0.1 (Reddit-Fork): Besteuert freien Cashflow (Ausschüttungen, Buybacks, geparktes Geld); Personalkosten im Inland abziehbar (pro Kopf gedeckelt), Investitionen teilweise. Wer automatisiert, zahlt mehr; wer Menschen beschäftigt, schirmt ab — eine Robotersteuer ohne Roboterdefinition. Exit-resistent, weil die Bemessungsgrundlage (inländischer Cashflow) nicht fliehen kann.", ne:"V0.1 (Reddit fork): Taxes free cash flow (payouts, buybacks, parked cash); domestic payroll deductible (capped per head), investment partially. Automating firms pay more; employing firms shield themselves — a robot tax without having to define a robot. Exit-resistant because the base (domestic cash flow) cannot flee."},
  FUND: {x:-870,y:165, type:"bright", chain:10, label:"Bürgerfonds: breiter Index, universelle Dividende", le:"Citizen fund: broad index, universal dividend", note:"V0.1: Die Steuer finanziert den Fonds selbst — am Budget (FS) vorbei. Kauft breit gestreut am Markt: kein Enteignungs-Trigger, keine Eigenfirmen-Anteile (Job und Ersparnis dürfen nicht am selben Tag crashen). Jeder Bürger = Miteigentümer; der jährliche Scheck nach Alaska-Vorbild macht Verteilung sichtbar und den Fonds politisch unkaputtbar — Schwedens Fonds starben, weil niemand sie vermisste. Wächst exakt im Tempo der Verdrängung, die er versichert.", ne:"V0.1: The tax finances the fund itself — bypassing the budget (FS). Buys a broad market index: no expropriation trigger, no own-employer shares (job and savings must not crash on the same day). Every citizen co-owns; the yearly Alaska-style check makes distribution visible and the fund politically kill-proof — Sweden's funds died because nobody would miss them. Grows exactly as fast as the displacement it insures."},
  OWN:  {x:-870,y:440, type:"bright", chain:10, label:"Wirtschaftsdemokratie: Belegschaftseigentum & Mitbestimmung", le:"Economic democracy: worker ownership & codetermination", note:"V0.1 (Reddit-Fork): Eigentum statt Transfer — belegschaftseigenes Kapital kann nicht fliehen. Aber: Stimme ist nicht Eigentum (50 Jahre Mitbestimmung retteten die Lohnquote nicht); Co-ops überleben Krisen besser, werden aber selten gegründet (Kapitalzugang — Mondragon brauchte die eigene Bank); Illyria-Problem (zu wenig Einstellung/Reinvestition) real. Praktikabel: Option finanzieren statt Ergebnis erzwingen — Vorkaufsrecht der Belegschaft, Buyout-Fonds (Marcora), Genossenschaftsbank.", ne:"V0.1 (Reddit fork): Ownership instead of transfer — worker-owned capital cannot flee. But: voice isn't ownership (50 years of codetermination didn't save the labor share); co-ops survive crises better yet form rarely (capital access — Mondragon needed its own bank); the Illyria problem (under-hiring/under-investment) is real. Practicable: finance the option instead of mandating the outcome — worker right of first refusal, buyout fund (Marcora), co-op bank."},

  // ---- V0.2: Finanz-Externalitäts-Motor (FIN) ----
  FIN: {x:-130,y:650, type:"convergence", chain:11, label:"Endogene Finanzfragilität: kreditfinanzierte Automations-/Asset-Blase → Boom-Bust", le:"Endogenous financial fragility: debt-financed automation/asset bubble → boom-bust", note:"FINANZ-EXTERNALITÄT — der dritte Motor neben ökologischer (ECO) und sozialer (SOZ) Erosion: privatisierte Gewinne, sozialisierte Verluste. Endogene Fragilität à la Minsky — Stabilität erzeugt Instabilität: niedrige Zinsen 2021/22 → Leverage → kreditfinanzierte Automations-/Asset-Blase → Maturity Wall ins Hochzins-Umfeld (Fed 6/2026: Dot-Plot auf Hike). Greift die optimistischste Annahme der Karte an: AUT→SURP→GROW unterstellt einen REALEN Überschuss — ein Teil davon ist eine Kreditblase, die platzen kann, statt verteilt zu werden. Die Mechanik (PIK, synthetische PIK via DDTL, Private-Credit-CLOs, mark-to-model/Level-3-Opazität, Liquiditäts-Mismatch) lebt HIER als Detail, nicht als eigene Knoten. Belege: IMF GFSR 2024 (fünf Vulnerabilitäten, „bad PIK“ = 57% des BDC-PIK, >40% negativer Cashflow); Gating real Q1 2026 (Blue Owl auf 5%, Blackstone +400 Mio. Eigenkapital, Cliffwater auf 7%). UMSTRITTEN bleibt die Schwere — „schlimmer als 2008 / ab 2027“ ist spekulativ, nicht verkabelt.", ne:"FINANCIAL EXTERNALITY — the third engine beside ecological (ECO) and social (SOZ) erosion: privatized gains, socialized losses. Endogenous Minsky fragility — stability breeds instability: low rates 2021/22 → leverage → debt-financed automation/asset bubble → maturity wall into a high-rate environment (Fed 6/2026: dot plot flips to a hike). Attacks the map's most optimistic assumption: AUT→SURP→GROW presumes a REAL surplus — part of it is a credit bubble that can burst rather than be distributed. The mechanics (PIK, synthetic PIK via DDTL, private-credit CLOs, mark-to-model/Level-3 opacity, liquidity mismatch) live HERE as detail, not as separate nodes. Evidence: IMF GFSR 2024 (five vulnerabilities, 'bad PIK' = 57% of BDC PIK, >40% negative cash flow); gating real in Q1 2026 (Blue Owl capped at 5%, Blackstone +$400m own capital, Cliffwater at 7%). CONTESTED is the severity — 'worse than 2008 / from 2027' is speculative, not wired."},

  // ---- V0.3: Einstiegsjob-Erosion / Karriereleiter-Bruch (ENT) ----
  ENT: {x:-40,y:280, type:"outcome", chain:1, label:"Einstiegsjob-Erosion: KI frisst die unterste Sprosse → junge Kohorte verpasst den Einstieg, Karriereleiter bricht", le:"Entry-level erosion: AI eats the bottom rung → the young cohort misses the on-ramp, the career ladder breaks", note:"STROM statt BESTAND — der Zwilling von B mit umgekehrter Inzidenz: B verdrängt die ETABLIERTE Mitte (wer drin ist, fliegt), ENT blockiert den ZUSTROM (wer rein will, kommt nicht rein). Nicht zu verwechseln mit dem „Einstieg“ in der C-Note (= Einstieg DER WELLE, welcher Tätigkeitstyp zuerst getroffen wird) — hier ist der BERUFS-Einstieg eines Menschen gemeint. Die Pointe ist der LEITER-BRUCH: die KI automatisiert genau die Junior-Sprosse, über die man früher zu den knappen Aufsichtsrollen (Au) aufstieg → sie greift zwei helle Pfade an (Au-Pipeline trocknet aus, Reskilling EDU/ADL verpufft ohne On-Ramp: „the learning curve is being automated“). Schärft zudem das VAC-Paradox: Knappheit an Erfahrenen neben Überschuss an Ausgesperrten — „need the job to get the job“. Dazu Scarring/Hysterese: eine Kohorte ohne Einstieg trägt eine dauerhafte Last (zeitliche Dimension, die der Querschnitt sonst nicht hat). Belege: Dallas Fed (22–25J in KI-exponierten Berufen −13% seit 2022); Einstiegs-Postings US −35% seit 1/2023 (Revelio); UK-Tech-Absolventenrollen −46% (2024); Absolventen-Arbeitslosenquote 9,7% (9/2025). UMSTRITTEN die Schwere (Klasse 2026 projiziert +5,6%); „30% Absolventen-Arbeitslosigkeit“ ist spekulativ, nicht verkabelt. Sektor-Detail lebt hier als Notiz, nicht als Knoten.", ne:"FLOW not STOCK — the twin of B with inverted incidence: B displaces the ESTABLISHED middle (those inside get pushed out), ENT blocks the INFLOW (those who want in can't get in). Not to be confused with the 'entry' in the C note (= entry OF THE WAVE, which task type is hit first) — here it's a person's CAREER entry. The point is the LADDER BREAK: AI automates exactly the junior rung by which one used to climb to the scarce oversight roles (Au) → it attacks two bright paths (the Au pipeline dries up; reskilling EDU/ADL fizzles without an on-ramp: 'the learning curve is being automated'). It also sharpens the VAC paradox: scarcity of the experienced alongside a surplus of the locked-out — 'need the job to get the job'. Plus scarring/hysteresis: a cohort without entry carries a lasting drag (the temporal dimension the cross-section otherwise lacks). Evidence: Dallas Fed (22–25yo in AI-exposed occupations −13% since 2022); US entry-level postings −35% since 1/2023 (Revelio); UK tech graduate roles −46% (2024); graduate unemployment 9.7% (9/2025). CONTESTED is the severity (class of 2026 projected +5.6%); '30% graduate unemployment' is speculative, not wired. Sector detail lives here as a note, not a node."},

  // ---- V0.4: Ökonomische Staatskunst eines Rivalen (MERC, CHOKE) ----
  MERC: {x:900,y:620, type:"convergence", chain:3, label:"Staatskapitalistische Subvention & Yuan-Unterbewertung → Überkapazität, Handels-Asymmetrie (China-Schock 2.0)", le:"State-capitalist subsidy & yuan undervaluation → overcapacity, trade asymmetry (China shock 2.0)", note:"ÖKONOMISCHE STAATSKUNST I — der externe Treiber, den LK bisher fehlte: LK wurde nur INTERN gespeist (S2). Ein subventionierter, unterbewerteter Rivale verriegelt nationale Alleingänge von außen UND deindustrialisiert handelbare Sektoren (der originale Autor-China-Schock — in MPWR ist Autor nur für Markups zitiert, NICHT für den Handelsschock; genau der fehlte als C-Treiber). Belege: Yuan 8,5% (IMF 7/2025) bis 18–25% (IMF-Update/Goldman 2026) unterbewertet; China 30% der Weltproduktion bei 13% Konsum; OECD — Stahl-Subvention 5× jeder andere Produzent; Exportvolumen 2025 doppeltes Welttempo, Q1 2026 +15%; „China-Schock 2.0“ in der EU bereits Politik (Überkapazitäts-Instrument). Das Leck (MERC→SEC): billige Güter heben den Konsumboden — wie AUT→SEC — selbst während sie Jobs zerstören. UMSTRITTEN bleibt, ob der Yuan heute aktiv gedrückt oder nur schwach gehalten wird; der Subventions-/Überkapazitäts-Kanal ist der robustere.", ne:"ECONOMIC STATECRAFT I — the external driver LK lacked: LK was fed only INTERNALLY (S2). A subsidized, undervalued rival bolts shut national go-it-alone moves from outside AND deindustrializes tradable sectors (the original Autor China shock — in MPWR Autor is cited only for markups, NOT for the trade shock; exactly that was missing as a C driver). Evidence: yuan 8.5% (IMF 7/2025) to 18–25% (IMF update/Goldman 2026) undervalued; China 30% of world manufacturing at 13% of consumption; OECD — steel subsidization 5× every other producer; 2025 export volume twice global pace, Q1 2026 +15%; 'China shock 2.0' already EU policy (overcapacity instrument). The leak (MERC→SEC): cheap goods raise the consumption floor — like AUT→SEC — even while they destroy jobs. CONTESTED is whether the yuan is actively pushed down today or merely held weak; the subsidy/overcapacity channel is the more robust one."},
  CHOKE: {x:1010,y:1000, type:"convergence", chain:3, label:"Strategische Ressourcen-/Lieferketten-Chokepoints als Waffe (seltene Erden, Verarbeitung)", le:"Strategic resource/supply-chain chokepoints as a weapon (rare earths, processing)", note:"ÖKONOMISCHE STAATSKUNST II — das geopolitische Analogon zu FIN: kein Endpunkt, sondern eine DROSSEL am hellen Überschuss-Motor. Automation, Robotik und Energiewende hängen an Magneten/Chips/Verarbeitung, die ein Rivale lizenziert und kappen kann → bremst AUT an der Wurzel, bevor der Überschuss verteilt werden kann. Belege: April 2025 — MOFCOM-Lizenzpflicht auf 7 mittlere/schwere SE + alle Magnete (plus Gallium/Germanium/Graphit); Chinas Hebel sitzt in der VERARBEITUNG (Know-how, Skala, Umwelt-Toleranz), nicht nur im Erz; US-Magnetproduktion erst 2027–28 → maximales Hebelfenster; Okt-2025-Eskalation nur bis 11/2026 ausgesetzt, April-Regime bleibt scharf. Härtet ORD und senkt T3 (Hebel statt Regeln) — kann aber den hellen BLOC-Fork zünden (europäische strategische Autonomie, CRMA, Friend-Shoring; umstritten, kann ebenso fragmentieren).", ne:"ECONOMIC STATECRAFT II — the geopolitical analogue of FIN: not an endpoint but a THROTTLE on the bright surplus engine. Automation, robotics and the energy transition hang on magnets/chips/processing a rival licenses and can cut → it brakes AUT at the root, before the surplus can be distributed. Evidence: April 2025 — MOFCOM licensing on 7 medium/heavy rare earths + all magnets (plus gallium/germanium/graphite); China's leverage sits in PROCESSING (know-how, scale, environmental tolerance), not just ore; US magnet production not until 2027–28 → maximum leverage window; the Oct-2025 escalation only suspended until 11/2026, the April regime stays in force. Hardens ORD and lowers T3 (leverage over rules) — but can ignite the bright BLOC fork (European strategic autonomy, CRMA, friend-shoring; contested, can equally fragment)."},

  // ---- V0.5: Digitale Fragilität / Offense-Dominanz (CYBER) ----
  CYBER: {x:60,y:-100, type:"convergence", chain:13, label:"Digitale Fragilität: Totaldigitalisierung × KI-beschleunigte Offensive → Angriffsfläche, Offense-Dominanz", le:"Digital fragility: total digitization × AI-accelerated offense → attack surface, offense-dominance", note:"FRAGILITÄTS-MOTOR III — neben FIN (finanziell) und CHOKE (physisch) der digitale: der ganze helle Überschuss läuft auf einem vernetzten Software-Untergrund (AUT, PLAT, KI-Bildung, digitale Koordination), und KI kippt die Offense-Defense-Balance. Vierte Janus-Fläche von A (neben B/ENT/AUT). Beleg: Claude Mythos Preview (Anthropic, 7.4.2026) — tausende Zero-Days (271 in Firefox, 181 mit Exploit), autonom geknackte 17-Jahre-FreeBSD-Lücke, zurückgehalten weil zu mächtig; General Rudd: NSA-Classified-Systeme im autorisierten Red-Team „in Stunden, nicht Wochen“ (11.6.2026). KNACKPUNKT = das Vorzeichen: dasselbe Modell ist dual-use (Offensive vs. Project Glasswing/Defensive); ob KI netto Angreifer oder Verteidiger stärkt, ist umstritten (CNAS) → A→CYBER trägt das Vorzeichen-Risiko. Bewusst NICHT verkabelt, um nicht zu verwässern: die Staatenwaffe (trägt G/ORD/CHOKE), Desinformation/Deepfakes (anderer Mechanismus, ggf. eigener Knoten über TRUST), die Finanz-Kaskade (trägt FIN).", ne:"FRAGILITY ENGINE III — beside FIN (financial) and CHOKE (physical), the digital one: the entire bright surplus runs on a networked software substrate (AUT, PLAT, AI education, digital coordination), and AI tips the offense-defense balance. The fourth Janus face of A (beside B/ENT/AUT). Evidence: Claude Mythos Preview (Anthropic, 7 Apr 2026) — thousands of zero-days (271 in Firefox, 181 with exploits), autonomously cracked a 17-year FreeBSD flaw, withheld because too powerful; General Rudd: NSA classified systems in an authorized red-team 'in hours, not weeks' (11 Jun 2026). THE CRUX = the sign: the same model is dual-use (offense vs. Project Glasswing/defense); whether AI net-empowers attackers or defenders is contested (CNAS) → A→CYBER carries the sign risk. Deliberately NOT wired, to avoid dilution: the state weapon (carried by G/ORD/CHOKE), disinformation/deepfakes (a different mechanism, possibly its own node via TRUST), the financial cascade (carried by FIN)."}
};
const EDGES = [
  {f:"A", t:"B",  conf:"plausibel", pol:"+", mech:"KI erledigt regelbasierte Wissensarbeit billiger/schneller als ein bezahlter Mensch → Arbeitgeber substituiert. Gegenthese: historisch baut Automation Jobs um statt sie zu vernichten (ATMs → mehr Bankangestellte).", me:"AI does rule-based knowledge work cheaper/faster than a paid human → employers substitute. Counter-thesis: historically automation rebuilds jobs rather than destroying them (ATMs → more bank tellers)."},
  {f:"B", t:"Bs", conf:"plausibel", pol:"+", mech:"Verdrängte Office-Arbeit wandert in schwer automatisierbare personennahe Dienste.", me:"Displaced office work moves into hard-to-automate person-centered services."},
  {f:"B", t:"Bm", conf:"plausibel", pol:"+", mech:"Modelle brauchen Aufsicht, Korrektur, Haftung → ein Teil wird Kurator/Monitor.", me:"Models need oversight, correction, liability → some become curators/monitors."},
  {f:"B", t:"Bw", conf:"plausibel", pol:"+", mech:"Keine gleichwertige Nachfrage rückt nach → ein Teil fällt netto weg.", me:"No equivalent demand follows → some positions are lost net."},
  {f:"Bs",t:"C",  conf:"belegt",    pol:"+", mech:"Service-Jobs sind schlechter bezahlt, unsicherer, schwächer organisiert → Lohndruck durch Zustrom Verdrängter.", me:"Service jobs are worse paid, less secure, weakly organized → wage pressure from the influx of the displaced."},
  {f:"Bw",t:"C",  conf:"plausibel", pol:"+", mech:"Arbeitslosigkeit/Unterbeschäftigung senkt die Verhandlungsmacht der Arbeit.", me:"Unemployment/underemployment lowers labor's bargaining power."},
  {f:"Bm",t:"Au", conf:"plausibel", pol:"+", mech:"Aufsicht über KI ist knapp und gut bezahlt → für wenige eine Aufwertung statt Abstieg.", me:"Oversight of AI is scarce and well paid → for a few an upgrade instead of a descent."},
  {f:"C", t:"D",  conf:"belegt",    pol:"+", mech:"Ökonomische Unsicherheit + Gefühl, vom Mainstream nicht geschützt zu werden → Abwendung von der Mitte. Empirisch gut gestützt (Strukturbruch-Regionen kippen messbar zu Populisten).", me:"Economic insecurity + feeling unprotected by the mainstream → turning away from the center. Empirically well supported (structural-break regions measurably tip to populists)."},
  {f:"C", t:"Dp", conf:"plausibel", pol:"+", mech:"Präkarisierung erzeugt den DRUCK nach Schutz/Umverteilung (Dp). Ob der Pfad zündet, entscheiden die Riegel LK und FS — nicht dieser Wunsch.", me:"Precarization creates the PRESSURE for protection/redistribution (Dp). Whether the path fires is decided by the locks LK and FS — not by this wish."},
  {f:"Dp",t:"C",  conf:"plausibel", pol:"-", mech:"GEGENKRAFT (unterdrückt): gelänge Stabilisierung durch Umverteilung, dämpfte sie die Präkarisierung. Der helle Pfad — dreifach verriegelt.", me:"COUNTERFORCE (suppressed): if stabilization through redistribution succeeded, it would dampen precarization. The bright path — locked threefold."},
  {f:"D", t:"E",  conf:"belegt",    pol:"+", mech:"Die Ränder sind souveränistisch; EU-Skepsis ist Programmkern → Renationalisierung. Dämpfer: Regierungsverantwortung zähmt die Anti-EU-Rhetorik (Meloni).", me:"The fringes are sovereigntist; EU skepticism is programmatic core → renationalization. Damper: governing responsibility tames the anti-EU rhetoric (Meloni)."},
  {f:"E", t:"C",  conf:"plausibel", pol:"+", loop:true, mech:"RÜCKKOPPLUNG: Renationalisierung → kleinere Märkte, Handelsreibung → geringere Wettbewerbsfähigkeit → mehr Druck → mehr Präkarisierung. Selbsttragender Kreis.", me:"FEEDBACK: renationalization → smaller markets, trade friction → lower competitiveness → more pressure → more precarization. Self-sustaining cycle."},
  {f:"T1",t:"C",  conf:"plausibel", pol:"-", mech:"Kipp-Variable: ein hoher Aufwertungsanteil senkt die Präkarisierung.", me:"Tipping variable: a high upgrading share lowers precarization."},
  {f:"T2",t:"Dp", conf:"plausibel", pol:"+", mech:"Kipp-Variable: ist Absicherung ohne Wettbewerbsverlust machbar, zündet der Stabilisierungspfad Dp.", me:"Tipping variable: if protection without competitiveness loss is feasible, the stabilization path Dp fires."},

  {f:"S2",t:"L",  conf:"belegt",    pol:"+", mech:"Steuerkeil auf Lohn gehört zu den höchsten der OECD → Arbeit ist im internationalen Vergleich teuer.", me:"The tax wedge on labor is among the highest in the OECD → labor is expensive by international comparison."},
  {f:"L", t:"J",  conf:"umstritten",pol:"+", mech:"Hoher Lohnkostenkeil → weniger Einstellungen / mehr Automation. Gegenbefund: Deutschland hat trotz hohem Keil niedrige Arbeitslosigkeit — Elastizität umkämpft.", me:"High labor-cost wedge → fewer hires / more automation. Counter-finding: Germany has low unemployment despite a high wedge — elasticity contested."},
  {f:"J", t:"C",  conf:"plausibel", pol:"+", mech:"KONVERGENZ: weniger Arbeitsplätze → mehr Unterbeschäftigung → Präkarisierung. Zweite unabhängige Kette, selber Knoten.", me:"CONVERGENCE: fewer jobs → more underemployment → precarization. A second independent chain, same node."},
  {f:"L", t:"B",  conf:"plausibel", pol:"+", mech:"VERSTÄRKER zwischen den Ketten: teure Arbeit erhöht den Anreiz, durch KI zu substituieren → hebelt A→B hoch.", me:"AMPLIFIER between chains: expensive labor raises the incentive to substitute via AI → levers up A→B."},
  {f:"S2",t:"R",  conf:"belegt",    pol:"+", mech:"Subventionierte Energie + niedrig besteuerter Ressourcenverbrauch = unterbepreiste Externalität → Überkonsum/Verschwendung.", me:"Subsidized energy + lightly taxed resource use = underpriced externality → overconsumption/waste."},
  {f:"S2",t:"LK", conf:"plausibel", pol:"+", mech:"Unilaterale Korrektur der Fehlbepreisung verteuert den Standort → Reform unterbleibt → Riegel hält.", me:"Unilateral correction of the mispricing raises location costs → reform is foregone → the lock holds."},
  {f:"S2",t:"DIST",conf:"plausibel",pol:"-", mech:"MASTER-SCHALTER: Arbeit hoch, Kapital/Ressourcen niedrig besteuert → begünstigt Kapitaleigner → drückt die Verteilung Richtung Kaperung.", me:"MASTER SWITCH: labor taxed high, capital/resources low → favors capital owners → pushes distribution toward capture."},
  {f:"LK",t:"Dp", conf:"belegt",    pol:"-", src:"Mitterrand 1981–83 (H04)", mech:"QUERVERBINDUNG: der Standortwettbewerbs-Riegel blockiert den Umverteilungspfad Dp. Beide Ketten scheitern an derselben Stelle. Kanonischer Fall: Mitterrand 1981 — Wahlsieg mit Radikalprogramm, nach zwei Jahren Kapitalflucht und drei Abwertungen die Kehrtwende (tournant de la rigueur).", me:"CROSS-LINK: the locational-competition lock also blocks the redistribution path Dp. Both chains fail at the same spot. Canonical case: Mitterrand 1981 — election won on a radical program; two years of capital flight and three devaluations later, the U-turn (tournant de la rigueur)."},
  {f:"LK",t:"DIST",conf:"plausibel",pol:"-", loop:true, mech:"MASTER-SCHALTER: hält der Riegel (keine Koordination), bleibt Verteilung Stückwerk → Kaperung. Hier wird die Kernthese im Graph GESCHLOSSEN, nicht behauptet. V0.1: Diese Kante schließt die Master-Schleife LK→DIST→SEC→P→LK (Vorzeichenprodukt +). Verstärkende Schleifen sind richtungslos — dieselbe Verkabelung, die die Dystopie hält, rastet als Utopie ein, sobald DIST einmal steigt. Bistabilität, kein Verhängnis.", me:"MASTER SWITCH: if the lock holds (no coordination), distribution stays piecemeal → capture. Here the core thesis is CLOSED in the graph, not asserted. V0.1: This edge closes the master loop LK→DIST→SEC→P→LK (sign product +). Reinforcing loops are directionless — the same wiring that holds the dystopia locks in as utopia once DIST rises. Bistability, not doom."},
  {f:"E", t:"LK", conf:"plausibel", pol:"+", mech:"QUERVERBINDUNG: Renationalisierung zerstört die supranationale Ebene → der Riegel verfestigt sich.", me:"CROSS-LINK: renationalization destroys the supranational level → the lock entrenches."},
  {f:"T3",t:"LK", conf:"plausibel", pol:"-", mech:"Kipp-Variable: gelingt Koordination oberhalb der Nation (OECD-Mindeststeuer als Präzedenz), öffnet sich der Riegel.", me:"Tipping variable: if coordination above the nation succeeds (OECD minimum tax as precedent), the lock opens."},

  {f:"P", t:"D",  conf:"plausibel", pol:"+", mech:"SUBSTRAT: Unter Druck zieht der Mensch den moralischen Kreis nach innen — „erst wir“. Erklärt, warum Präkarisierung zu Abschottung wird statt zu Solidarität.", me:"SUBSTRATE: under pressure the human pulls the moral circle inward — 'us first'. Explains why precarization becomes closure rather than solidarity."},
  {f:"P", t:"E",  conf:"plausibel", pol:"+", mech:"SUBSTRAT: Renationalisierung IST die konzentrische Kontraktion — der Kreis schrumpft von Welt/Europa auf Land.", me:"SUBSTRATE: renationalization IS the concentric contraction — the circle shrinks from world/Europe to country."},
  {f:"P", t:"LK", conf:"plausibel", pol:"+", mech:"SUBSTRAT: In-group-Präferenz macht supranationale Koordination unnatürlich → der Riegel hält.", me:"SUBSTRATE: in-group preference makes supranational coordination unnatural → the lock holds."},
  {f:"SEC",t:"P", conf:"plausibel", pol:"-", mech:"REGLER: hohe Sicherheit/Überfluss WEITET den Kreis (senkt die Enge P); Knappheit verengt ihn. Der kantische Universal als Gegenkraft — konditional auf Sicherheit.", me:"REGULATOR: high security/abundance WIDENS the circle (lowers narrowness P); scarcity narrows it. The Kantian universal as counterforce — conditional on security."},
  {f:"C", t:"SEC",conf:"plausibel", pol:"-", loop:true, mech:"TIEFSTE SCHLEIFE: Präkarisierung SENKT die wahrgenommene Sicherheit → verengt den Kreis (P↑) → Abschottung → mehr Knappheit → mehr Präkarisierung.", me:"DEEPEST LOOP: precarization LOWERS perceived security → narrows the circle (P↑) → closure → more scarcity → more precarization."},

  {f:"G",  t:"ORD", conf:"belegt",    pol:"+", mech:"Großmächte handeln nach Stärke statt nach Institutionen → Erosion der regelbasierten Ordnung.", me:"Great powers act by strength rather than institutions → erosion of the rule-based order."},
  {f:"G",  t:"RES", conf:"plausibel", pol:"+", mech:"Rüstungswettlauf + Prestigeprojekte binden Kapital und Talent → fehlen für nachhaltige Entwicklung.", me:"Arms race + prestige projects bind capital and talent → missing for sustainable development."},
  {f:"G",  t:"BLOC",conf:"umstritten",pol:"+", mech:"Äußere Bedrohung KANN Kohäsion erzeugen: gemeinsamer Feind → „Europa als Block“. Hoffnungsvoll und umstritten — kann ebenso fragmentieren.", me:"External threat CAN create cohesion: common enemy → 'Europe as a bloc'. Hopeful and contested — can equally fragment."},
  {f:"RES",t:"R",   conf:"plausibel", pol:"+", mech:"KONVERGENZ: geopolitische Fehlallokation trifft die ökologische Fehlbepreisung — dieselbe Verschwendung aus zwei Quellen.", me:"CONVERGENCE: geopolitical misallocation meets the ecological mispricing — the same waste from two sources."},
  {f:"ORD",t:"T3",  conf:"belegt",    pol:"-", mech:"KONVERGENZ (3. Kette): machtbasierte Ordnung macht regelbasierte Koordination unmöglich → T3 sinkt → Master-Schalter überdeterminiert.", me:"CONVERGENCE (3rd chain): power-based order makes rule-based coordination impossible → T3 falls → master switch overdetermined."},
  {f:"ORD",t:"DIST",conf:"plausibel", pol:"-", mech:"MASTER-SCHALTER: in einer Machtordnung setzt sich Stärke durch, nicht geteilte Regeln → Verteilung kippt zur Kaperung.", me:"MASTER SWITCH: in a power order strength prevails, not shared rules → distribution tips to capture."},
  {f:"P",  t:"ORD", conf:"plausibel", pol:"+", mech:"SUBSTRAT auf Makroebene: „first“-Politik der Staaten = konzentrischer Kreis auf Staatsebene. P wiederholt sich im großen Maßstab.", me:"SUBSTRATE at the macro scale: 'first' politics of states = concentric circle at state level. P repeats on the large scale."},
  {f:"ORD",t:"SYS", conf:"belegt",    pol:"+", mech:"Machtbasierte Ordnung begünstigt Zentralisierung & Stärke → die Systemfrage wird offen gestellt.", me:"Power-based order favors centralization & strength → the system question is opened."},
  {f:"SYS",t:"DIST",conf:"umstritten",pol:"-", mech:"MASTER-SCHALTER (Sackgasse geschlossen): Autokratie konzentriert Macht/Vermögen → Kaperung; Demokratie hält Verteilung offen. Vorzeichen umstritten — auch Autokratien können umverteilen.", me:"MASTER SWITCH (dead end closed): autocracy concentrates power/wealth → capture; democracy keeps distribution open. Sign contested — autocracies can redistribute too."},
  {f:"BLOC",t:"LK", conf:"umstritten",pol:"-", mech:"GEGEN-FORK: europäische Integration unter Druck wäre ein Stück Koordination → könnte den Riegel öffnen. Umstritten — Aufrüstung kann ebenso national zersplittern.", me:"COUNTER-FORK: European integration under pressure would be a piece of coordination → could open the lock. Contested — rearmament can equally splinter nationally."},

  {f:"S4", t:"WZ", conf:"belegt",    pol:"+", mech:"Schulden bleiben nur tragbar, wenn die Wirtschaft schneller wächst als die Zinslast (g > r) → Wachstumszwang.", me:"Debt stays sustainable only if the economy grows faster than the interest burden (g > r) → growth imperative."},
  {f:"S4", t:"FS", conf:"belegt",    pol:"+", mech:"Zinslast und Tilgung binden das Budget → weniger Spielraum für Investition/Alimentierung.", me:"Interest and amortization bind the budget → less room for investment/subsidy."},
  {f:"S4", t:"INV",conf:"plausibel", pol:"+", mech:"Die Schuld kann produktiv (investiv) oder konsumtiv verwendet werden — Verzweigung, die über Wachstum entscheidet.", me:"The debt can be used productively (investment) or consumptively — a branch that decides about growth."},
  {f:"INV",t:"GROW",conf:"umstritten",pol:"+", mech:"HELLER FORK: produktive Schuld (Investition in Produktivität/Energie/Bildung) ERZEUGT Wachstum → Positivsumme. Konsumtive nicht. Multiplikator produktiver Schulden ist umstritten.", me:"BRIGHT FORK: productive debt (investment in productivity/energy/education) GENERATES growth → positive-sum. Consumptive does not. The multiplier of productive debt is contested."},
  {f:"AUT",t:"GROW",conf:"plausibel", pol:"+", mech:"BRÜCKE hell↔Motor: der Produktivitätsüberschuss aus Automation IST eine Quelle tatsächlichen Wachstums.", me:"BRIDGE bright↔engine: the productivity surplus from automation IS a source of actual growth."},
  {f:"WZ", t:"DIST",conf:"plausibel", pol:"-", mech:"MASTER-SCHALTER: der Wachstumszwang unter Schulden begünstigt Kapital/Austerität (Lohnzurückhaltung, Standortpflege) → drückt die Verteilung zur Kaperung.", me:"MASTER SWITCH: the growth imperative under debt favors capital/austerity (wage restraint, location care) → pushes distribution toward capture."},
  {f:"GROW",t:"SEC",conf:"plausibel", pol:"+", mech:"Erfülltes Wachstum = Positivsummen-Überfluss → hebt die wahrgenommene Sicherheit → weiter Kreis. Der ökonomische Motor unter SEC.", me:"Met growth = positive-sum abundance → raises perceived security → wider circle. The economic engine beneath SEC."},
  {f:"GROW",t:"R", conf:"plausibel", pol:"+", mech:"Wachstum frisst Ressourcen → kollidiert mit Nachhaltigkeit (die Kehrseite des Motors).", me:"Growth eats resources → collides with sustainability (the flip side of the engine)."},
  {f:"GROW",t:"C", conf:"plausibel", pol:"-", mech:"Wachstum macht Verteilung zum Positivsummenspiel → entschärft den Verteilungskonflikt → dämpft Präkarisierung.", me:"Growth makes distribution a positive-sum game → defuses the distributional conflict → dampens precarization."},
  {f:"ECO",t:"GROW",conf:"plausibel",pol:"-", mech:"Klimaschäden zerstören Kapital und Produktivität → untergraben das Wachstum, das die Schuldenfalle entschärfen müsste.", me:"Climate damage destroys capital and productivity → undermines the growth that should defuse the debt trap."},
  {f:"FS", t:"Dp", conf:"belegt",    pol:"-", mech:"DRITTER RIEGEL: selbst bei politischem Willen kein Geld → Umverteilung scheitert fiskalisch. Dp aus drei Richtungen verriegelt.", me:"THIRD LOCK: even with political will, no money → redistribution fails fiscally. Dp locked from three directions."},
  {f:"FS", t:"C",  conf:"plausibel", pol:"+", mech:"Der Staat kann Präkarisierte nicht abfedern → verschärft die Präkarisierung direkt.", me:"The state cannot cushion the precarized → worsens precarization directly."},

  {f:"DEM",t:"S4", conf:"belegt",    pol:"+", mech:"Alterung → steigende Renten-/Gesundheitslasten bei schrumpfender Beitragsbasis → höhere Verschuldung.", me:"Aging → rising pension/health burdens on a shrinking contribution base → higher debt."},
  {f:"DEM",t:"GROW",conf:"plausibel",pol:"-", mech:"Schrumpfende Erwerbsbevölkerung senkt das Potenzialwachstum → verschärft den Wachstumszwang.", me:"A shrinking workforce lowers potential growth → sharpens the growth imperative."},
  {f:"DEM",t:"B",  conf:"plausibel", pol:"-", mech:"ANTI-DOOM-GEGENKRAFT: die schrumpfende Belegschaft lässt eine Lücke, die Automation FÜLLT statt zu verdrängen → dämpft den Netto-Jobverlust.", me:"ANTI-DOOM COUNTERFORCE: the shrinking workforce leaves a gap that automation FILLS rather than displacing → dampens net job loss."},

  {f:"R",   t:"ECO",  conf:"belegt",    pol:"+", mech:"Kumulierte Verschwendung und unbepreiste Externalitäten → Klimawandel, Biodiversitätsverlust, Bodendegradation.", me:"Accumulated waste and unpriced externalities → climate change, biodiversity loss, soil degradation."},
  {f:"ECO", t:"SEC",  conf:"plausibel", pol:"-", mech:"MOTOR: ökologische Schäden = reale Knappheit (Ernten, Wasser, Land) → senken die wahrgenommene Sicherheit. Zweiter Treiber des Attraktors.", me:"ENGINE: ecological damage = real scarcity (harvests, water, land) → lowers perceived security. The second driver of the attractor."},
  {f:"ECO", t:"D",    conf:"umstritten",pol:"+", mech:"Klimaschäden → Migrationsdruck → In-group-Backlash → Radikalisierung. Direkte zweite Speisung von D — die Kette Klima→Migration→Rechtsruck ist umstritten.", me:"Climate damage → migration pressure → in-group backlash → radicalization. A direct second feed of D — the chain climate→migration→right-shift is contested."},
  {f:"ECO", t:"ECOc", conf:"umstritten",pol:"+", mech:"Heller Fork: existenzielle Bedrohung KÖNNTE den Kreis auf „Menschheit“ weiten — aber gebremst, weil Klima diffus/langsam ist.", me:"Bright fork: an existential threat COULD widen the circle to 'humanity' — but braked, because climate is diffuse/slow."},
  {f:"ECOc",t:"LK",   conf:"umstritten",pol:"-", mech:"Gelänge planetare Kooperation, öffnete sie den Riegel (wie BLOC) — der schmale, spekulative globale Ausweg.", me:"If planetary cooperation succeeded, it would open the lock (like BLOC) — the narrow, speculative global exit."},

  {f:"C",  t:"SOZ", conf:"belegt",    pol:"+", mech:"Präkarisierung materialisiert sich im Alltag: Armut, Obdachlosigkeit, Perspektivlosigkeit.", me:"Precarization materializes in daily life: poverty, homelessness, hopelessness."},
  {f:"DIST",t:"SOZ",conf:"plausibel", pol:"-", mech:"Höherer Verteilungsgrad dämpft die soziale Erosion an der Wurzel; Kaperung verstärkt sie.", me:"A higher degree of distribution dampens social erosion at the root; capture amplifies it."},
  {f:"SOZ",t:"SEC", conf:"plausibel", pol:"-", loop:true, mech:"DIE EXTERNALITÄT: sichtbarer Verfall, Vandalismus und Kriminalität senken die wahrgenommene Sicherheit der GANZEN Gesellschaft — unbepreist, wie die ökologische Degeneration. Macht SOZ zum sozialen Motor des Attraktors.", me:"THE EXTERNALITY: visible decay, vandalism and crime lower the perceived security of SOCIETY AS A WHOLE — unpriced, like ecological degeneration. Makes SOZ the social engine of the attractor."},
  {f:"SOZ",t:"D",   conf:"plausibel", pol:"+", mech:"Perspektivlosigkeit + radikalisierte Kriminalität → Zulauf zu den Rändern. Rückkopplung, denn Radikalisierung (D) befeuert die Gewalt ihrerseits.", me:"Hopelessness + radicalized crime → influx to the fringes. A loop, since radicalization (D) fuels the violence in turn."},

  {f:"A",   t:"AUT", conf:"plausibel", pol:"+", mech:"JANUS: dieselbe KI-Fähigkeit, die Jobs ersetzt (A→B), erzeugt zugleich einen Produktivitätsüberschuss. Eine Quelle, zwei Gesichter.", me:"JANUS: the same AI capability that replaces jobs (A→B) also generates a productivity surplus. One source, two faces."},
  {f:"AUT", t:"SURP",conf:"plausibel", pol:"+", mech:"Produktivitätsüberschuss speist den potenziellen Wohlstand.", me:"Productivity surplus feeds potential prosperity."},
  {f:"EDU", t:"SURP",conf:"plausibel", pol:"+", mech:"Breite Qualifizierung speist den potenziellen Wohlstand (Humankapital).", me:"Broad upskilling feeds potential prosperity (human capital)."},
  {f:"MED", t:"SURP",conf:"plausibel", pol:"+", mech:"Gesundheits-/Technikgewinne speisen den potenziellen Wohlstand.", me:"Health/technical gains feed potential prosperity."},
  {f:"EDU", t:"Au",  conf:"plausibel", pol:"+", mech:"KI-Bildung qualifiziert in der Breite → mehr Menschen in den Aufwertungspfad statt Service/Wegfall.", me:"AI education upskills at scale → more people into the upgrading path instead of service/redundancy."},
  {f:"EDU", t:"DIST",conf:"plausibel", pol:"+", mech:"MASTER-SCHALTER (hell): breit zugängliche Qualifizierung verteilt die Gewinne breiter → hebt den Verteilungsgrad.", me:"MASTER SWITCH (bright): broadly accessible upskilling distributes the gains more widely → raises the degree of distribution."},
  {f:"MED", t:"SEC", conf:"plausibel", pol:"+", mech:"Fortschritt hebt Lebensqualität und senkt Kosten → hebt die Basis-Sicherheit direkt → weiter Kreis.", me:"Progress raises quality of life and lowers costs → raises baseline security directly → wider circle."},
  {f:"Au",  t:"DIST",conf:"plausibel", pol:"-", mech:"AMBIVALENZ (Sackgasse geschlossen): Aufwertungsrollen sind ihrer Natur nach KNAPP → konzentrieren die Gewinne bei wenigen → drücken die Verteilung zur Kaperung. Nur breite Bildung (EDU) mildert das.", me:"AMBIVALENCE (dead end closed): upgrading roles are by nature SCARCE → concentrate the gains in a few → push distribution toward capture. Only broad education (EDU) softens this."},
  {f:"SURP",t:"DIST",conf:"belegt",    pol:"+", mech:"Der Überschuss existiert — er ist die Masse, die überhaupt verteilt werden kann.", me:"The surplus exists — it is the mass that can be distributed at all."},
  {f:"DIST",t:"SEC", conf:"plausibel", pol:"+", mech:"UTOPIE-ROUTE: breit verteilter Überschuss → breit gefühlter Wohlstand → SEC↑ → weiter Kreis → Riegel öffnen.", me:"UTOPIA ROUTE: broadly distributed surplus → broadly felt prosperity → SEC↑ → wider circle → locks open."},
  {f:"DIST",t:"C",   conf:"plausibel", pol:"-", mech:"Hoher Verteilungsgrad dämpft die Präkarisierung an der Wurzel. Niedriger (Kaperung) → Überfluss OHNE Sicherheit → Dystopie.", me:"A high degree of distribution dampens precarization at the root. Low (capture) → abundance WITHOUT security → dystopia."},

  // ---- Empirische Mediatoren (Deep-Research-Memo) ----
  {f:"S2",  t:"FS",  conf:"plausibel", pol:"+", src:"OECD Corporate Tax Stats 2025 (K09)", mech:"FISC-Brücke: Steuer-Fehlbepreisung & Gewinnverlagerung mindern die Einnahmebasis → mehr Budget-Enge.", me:"FISC bridge: tax mispricing & profit shifting erode the revenue base → tighter budget."},
  {f:"FS",  t:"SPROT",conf:"plausibel",pol:"-", src:"WIL 2026 (K01), OECD RTM 2024 (K02)", mech:"Mehr Budget-Enge → weniger tragfähige soziale Sicherung (Deckung, Ersatzraten).", me:"Tighter budget → less sustainable social protection (coverage, replacement rates)."},
  {f:"SPROT",t:"SEC",conf:"plausibel", pol:"+", src:"OECD RTM 2024 (K02), Eurofound 2024 (K03)", mech:"Verlässliche Sicherung macht Schocks weniger existenziell → reale und gefühlte Resilienz steigt.", me:"Reliable protection makes shocks less existential → real and perceived resilience rise."},
  {f:"HOU", t:"SEC", conf:"belegt",    pol:"-", src:"Eurofound 2024/25 (K03, K04)", mech:"Steigende Wohnkostenlast absorbiert verfügbares Einkommen → senkt selbst bei Beschäftigung das Sicherheitsgefühl.", me:"Rising housing-cost burden absorbs disposable income → lowers the sense of security even when employed."},
  {f:"HOU", t:"SOZ", conf:"plausibel", pol:"+", src:"Eurofound 2024 (K03)", mech:"Wohnungsunsicherheit verzögert Lebensschritte, erhöht Stress → verstärkt soziale Frakturen im Alltag.", me:"Housing insecurity delays life steps, raises stress → amplifies everyday social fractures."},
  {f:"SEC", t:"TRUST",conf:"plausibel",pol:"+", src:"Eurofound Trust (K04), OECD Trust 2024 (K05)", mech:"Wo die finanzielle Lage weniger prekär erlebt wird, fällt institutionelles Vertrauen systematisch höher aus.", me:"Where the financial situation is experienced as less precarious, institutional trust is systematically higher."},
  {f:"TRUST",t:"D",  conf:"plausibel", pol:"-", src:"OECD Trust (K05), Guiso/Herrera/Morelli/Sonno (K06)", mech:"Höheres Vertrauen dämpft die Nachfrage nach anti-institutionellen/protektionistischen Antworten — messbarer Proxy für das Substrat P.", me:"Higher trust dampens demand for anti-institutional/protectionist answers — a measurable proxy for the substrate P."},
  {f:"PLAT",t:"MPWR",conf:"plausibel", pol:"+", src:"OECD digital markets (K10), Eurofound platform work (K18)", mech:"Netzwerkeffekte, Datenakkumulation, Lock-in und Tipping stärken Gatekeeper-Macht und erschweren Wettbewerb.", me:"Network effects, data accumulation, lock-in and tipping strengthen gatekeeper power and impede competition."},
  {f:"MPWR",t:"DIST",conf:"belegt",    pol:"-", src:"De Loecker/Eeckhout/Unger (K07), Autor et al. (K08)", mech:"MASTER-SCHALTER (ökonomisch): höhere Markups und sinkende Lohnquote verschieben Überschüsse zu Kapital- und Gatekeeper-Renten → Kaperung.", me:"MASTER SWITCH (economic): higher markups and a falling labor share shift surpluses to capital and gatekeeper rents → capture."},
  {f:"EDU", t:"ADL", conf:"plausibel", pol:"+", src:"OECD Adult skills/learning (K14, K15)", mech:"KI-Bildung speist den Erwachsenen-Reskilling-Kanal — den im KI-/Demografie-Kontext eigentlich entscheidenden.", me:"AI education feeds the adult reskilling channel — the one that actually matters under AI/demographics."},
  {f:"ADL", t:"DIST",conf:"plausibel", pol:"+", src:"OECD RTM (K02), Adult skills (K14), Adult learning (K15)", mech:"Breiter Zugang zu Erwachsenenlernen erhöht die Chance, dass KI-/Digitalgewinne breit statt eng diffundieren. Aber: Zugang ist ungleich verteilt.", me:"Broad access to adult learning raises the chance that AI/digital gains diffuse broadly rather than narrowly. But: access is unequally distributed."},
  {f:"ADL", t:"C",   conf:"plausibel", pol:"-", src:"OECD Adult skills/learning (K14, K15)", mech:"Reskilling senkt Verdrängungsrisiken in exponierten Tätigkeiten und verbessert Übergänge.", me:"Reskilling lowers displacement risk in exposed tasks and improves transitions."},
  {f:"DEM", t:"VAC", conf:"belegt",    pol:"+", src:"OECD Employment Outlook 2025 (K16), JRC/Eurostat (K17)", mech:"Schrumpfende Erwerbsbevölkerung → offene Stellen, Arbeitskräfteknappheit (Wendepunkt 2025).", me:"Shrinking workforce → vacancies, labor scarcity (turning point 2025)."},
  {f:"VAC", t:"C",   conf:"plausibel", pol:"-", src:"OECD EO 2025 (K16), JRC/Eurostat (K17)", mech:"Bei Arbeitskräfteknappheit füllt Technik eher Lücken, statt ausschließlich Beschäftigte zu ersetzen → dämpft Präkarisierung.", me:"Under labor scarcity, tech tends to fill gaps rather than only replacing workers → dampens precarization."},
  {f:"VAC", t:"AUT", conf:"plausibel", pol:"+", src:"OECD EO 2025 (K16), IAB (DE01)", mech:"Knappes Arbeitsangebot erhöht den Anreiz zur Produktivitätsinvestition in Software, Robotik und KI.", me:"Scarce labor supply raises the incentive to invest in productivity — software, robotics, AI."},

  // ---- V0.1: Reddit-Forks & Gegenkanten ----
  {f:"SURP",t:"CFT", conf:"plausibel", pol:"+", mech:"V0.1: Der Überschuss ist die Bemessungsgrundlage: je größer der freie Cashflow aus Automation, desto mehr lässt sich abschöpfen. Norwegen schöpfte Öl-Rente — hier spielt die Automations-Rente das Öl.", me:"V0.1: The surplus is the tax base: the bigger the free cash flow from automation, the more can be skimmed. Norway skimmed oil rents — here the automation rents play the role of the oil."},
  {f:"CFT", t:"FUND",conf:"plausibel", pol:"+", mech:"SELBSTFINANZIERUNG: Die Abschöpfung fließt direkt in den Fonds, nicht ins Budget — der dritte Riegel (FS) wird umgangen statt geknackt.", me:"SELF-FINANCING: the skim flows straight into the fund, not the budget — the third lock (FS) is bypassed rather than broken."},
  {f:"FUND",t:"DIST",conf:"plausibel", pol:"+", src:"Alaska PFD; Norwegen GPFG (R01)", mech:"PRÄDISTRIBUTION: Jeder Bürger wird Miteigentümer des Kapitalstocks; die Dividende fragt nicht nach dem Arbeitsvertrag. Hebt den Verteilungsgrad direkt, ohne durch den verriegelten Pfad Dp zu müssen.", me:"PREDISTRIBUTION: every citizen co-owns the capital stock; the dividend doesn't ask for an employment contract. Raises distribution directly, without passing through the locked path Dp."},
  {f:"CFT", t:"B",   conf:"plausibel", pol:"-", mech:"GEGENKRAFT zur Substitution: Der Personalabzug macht Menschen relativ billiger als Automation — kehrt den Verstärker L→B um. Wer beschäftigt, schirmt seinen Cashflow ab.", me:"COUNTERFORCE to substitution: the payroll deduction makes humans relatively cheaper than automation — inverts the amplifier L→B. Employing people shields your cash flow."},
  {f:"ORD", t:"CFT", conf:"umstritten", pol:"-", src:"DST-Drohungen 2019; §899/Side-by-Side 2025/26 (R02)", mech:"HEGEMONIE-RIEGEL: Vergeltungsdrohung (Zölle, Revenge-Tax) drückt die Einführung — oft als vorauseilender Gehorsam. Gegenbefund: Getriggert wurden bisher sichtbar US-zentrierte Steuern (DST); eine Reform der eigenen Basis trifft zuerst VW, nicht Ohio. Richtige Einheit: EU (wechselseitige Abschreckung); Worst Case: Carve-out statt Kollaps (Pillar-2-Präzedenz).", me:"HEGEMON LOCK: retaliation threats (tariffs, revenge tax) suppress adoption — often as anticipated obedience. Counter-finding: what triggered retaliation so far were visibly US-centric taxes (DSTs); reforming your own base hits VW before Ohio. Right unit: the EU (mutual deterrence); worst case: carve-out, not collapse (Pillar 2 precedent)."},
  {f:"OWN", t:"DIST",conf:"plausibel", pol:"+", mech:"V0.1: Eigentum verteilt den Überschuss an der Quelle: Kapitaleinkommen fließt an Belegschaften statt nur an externe Eigner — und belegschaftseigenes Kapital kann nicht fliehen, es umgeht den Standortriegel, statt ihn zu brechen.", me:"V0.1: Ownership distributes the surplus at the source: capital income flows to workforces, not only outside owners — and worker-owned capital cannot flee; it sidesteps the location lock rather than breaking it."},
  {f:"LK",  t:"OWN", conf:"umstritten", pol:"-", src:"SE-Umwandlungen: SAP, Allianz, Porsche SE (R03)", mech:"JURISTISCHER EXIT: Wo Mitbestimmungs-/Eigentums-Mandate binden, weichen Konzerne per Rechtsformwechsel aus (SE-Flucht) — der Riegel beißt, ohne dass eine Fabrik umzieht. Freiwillige, finanzierte Modelle (Vorkaufsrecht + Buyout-Fonds) entziehen sich dem.", me:"LEGAL EXIT: where codetermination/ownership mandates bind, firms dodge via legal-form change (SE flight) — the lock bites without a single factory moving. Voluntary, financed models (right of first refusal + buyout fund) escape it."},
  {f:"C",   t:"FS",  conf:"plausibel", pol:"+", mech:"VIERTER RIEGEL (V0.1, aus dem Nordics-Einwand): Lohnfinanzierte Umverteilung hängt an einer breiten Lohnbasis — genau die erodiert die KI-Kette. Präkarisierung schrumpft die Einnahmen und erhöht die Ausgaben → Budget-Enge. Schließt Kette 1 an Kette 4 an.", me:"FOURTH LOCK (V0.1, from the Nordics objection): wage-financed redistribution depends on a broad wage base — exactly what the AI chain erodes. Precarization shrinks revenue and raises spending → budget squeeze. Connects chain 1 to chain 4."},
  {f:"D",   t:"Dp",  conf:"plausibel", pol:"+", src:"Bismarck 1880er; New Deal; NHS 1948 (H01)", mech:"BISMARCK-THERMOSTAT (V0.1): Radikalisierung erzeugt Umverteilung über Elitenangst — Sozialversicherung neben Sozialistengesetzen, New Deal, NHS bei ~250% Schuldenquote (der FS-Riegel ist historisch weich). Schließt die balancierende Schleife D→Dp→C→D.", me:"BISMARCK THERMOSTAT (V0.1): radicalization produces redistribution via elite fear — social insurance alongside the Anti-Socialist Laws, the New Deal, the NHS at ~250% debt-to-GDP (the FS lock is historically soft). Closes the balancing loop D→Dp→C→D."},
  {f:"G",   t:"DIST",conf:"umstritten", pol:"+", src:"Scheve/Stasavage, Taxing the Rich (H02)", mech:"GEGENKANTE (V0.1): Massenbedrohung war historisch der stärkste Heber progressiver Verteilung — Kriege trieben Spitzensteuern und Wohlfahrtsstaaten (Konskriptions-Fairness). Umstritten, weil High-Tech-Konflikte nicht mehr massenmobilisieren.", me:"COUNTER-EDGE (V0.1): mass threat was historically the strongest lever of progressive distribution — wars drove top tax rates and welfare states (conscription fairness). Contested because high-tech conflict no longer mass-mobilizes."},
