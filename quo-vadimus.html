  {f:"AUT", t:"SEC", conf:"plausibel", pol:"+", src:"Konsum- vs. Einkommens-Ungleichheit (H03)", mech:"DAS TOR LECKT (V0.1): Technik verteilt Gebrauchswert ohne Verteilungspolitik — Generika, Solarstrom, Smartphones. Konsum-Ungleichheit ist überall kleiner als Einkommens-Ungleichheit: Der SEC-Boden steigt selbst bei Kaperung der Geld-Einkommen.", me:"THE GATE LEAKS (V0.1): technology distributes use-value without distribution policy — generics, solar power, smartphones. Consumption inequality is everywhere smaller than income inequality: the SEC floor rises even when money incomes are captured."},
  {f:"VAC", t:"DIST",conf:"plausibel", pol:"+", src:"OECD EO 2025 (K16)", mech:"V0.1: Arbeitskräfteknappheit hebt die Verhandlungsmacht der Arbeit → Lohnquote stabilisiert sich → der Überschuss diffundiert breiter. Die sicherste Kraft der Karte (Demografie) drückt DIST nach oben.", me:"V0.1: labor scarcity raises labor's bargaining power → the wage share stabilizes → the surplus diffuses more broadly. The map's most certain force (demographics) pushes DIST upward."},

  // ---- V0.2: Finanz-Externalitäts-Motor (Minsky-Oszillator) ----
  {f:"AUT", t:"FIN", conf:"plausibel", pol:"+", src:"IMF GFSR 2024; Fed 6/2026 (Dot-Plot→Hike)", mech:"Die schuldenfinanzierte Automationswelle baut die Blase, die platzt: KI-Capex und Buyouts laufen über privaten Kredit, ein wachsender Teil gegen „dead software & depreciating GPUs“ statt Realwerte. Der Boom finanziert den Bust.", me:"The debt-financed automation wave builds the bubble that bursts: AI capex and buyouts run on private credit, a growing share against 'dead software & depreciating GPUs' rather than real assets. The boom finances the bust."},
  {f:"GROW", t:"FIN", conf:"plausibel", pol:"+", loop:true, mech:"MINSKY-SCHLEIFE: realisiertes Wachstum und Asset-Gewinne nähren Euphorie und Leverage → Fragilität steigt („stability breeds instability“). Schließt mit FIN→GROW den Boom-Bust-Oszillator — eine BALANCIERENDE Schleife (Vorzeichenprodukt −), die schwingt statt davonzulaufen: Crash → Deleveraging → weniger Fragilität → nächster Boom.", me:"MINSKY LOOP: realized growth and asset gains feed euphoria and leverage → fragility rises ('stability breeds instability'). With FIN→GROW it closes the boom-bust oscillator — a BALANCING loop (sign product −) that oscillates rather than running away: crash → deleveraging → less fragility → next boom."},
  {f:"FIN", t:"GROW", conf:"plausibel", pol:"-", mech:"Der Crash zerstört Kapital und Kredit → Rezession (analog ECO→GROW). Die dritte Kraft, die genau das Wachstum untergräbt, das die Schuldenfalle entschärfen müsste.", me:"The crash destroys capital and credit → recession (analogous to ECO→GROW). The third force undermining exactly the growth that should defuse the debt trap."},
  {f:"FIN", t:"SEC", conf:"plausibel", pol:"-", mech:"MOTOR-SIGNATUR: ein Crash vernichtet Ersparnisse und Renten — Pensionsfonds und Retail halten die CLO-/BDC-Bags → die wahrgenommene Sicherheit bricht für ALLE, unbepreist wie ökologische (ECO) und soziale (SOZ) Erosion. Das macht FIN zum dritten Externalitäts-Motor des Attraktors.", me:"ENGINE SIGNATURE: a crash wipes out savings and pensions — pension funds and retail hold the CLO/BDC bags → perceived security collapses for EVERYONE, unpriced like ecological (ECO) and social (SOZ) erosion. This makes FIN the attractor's third externality engine."},
  {f:"FIN", t:"C", conf:"plausibel", pol:"+", mech:"Finanzkrise → Kreditklemme → Entlassungen → Präkarisierung. Der direkte, schnelle Kanal (Lehman-Signatur), zusätzlich zum langsameren über GROW.", me:"Financial crisis → credit crunch → layoffs → precarization. The direct, fast channel (Lehman signature), on top of the slower one via GROW."},
  {f:"FIN", t:"DIST", conf:"umstritten", pol:"-", src:"Blue Owl/Blackstone/Cliffwater Gating Q1 2026; IMF GFSR 2024", mech:"KAPERUNGS-INSTANZ (kein neuer Kanal): sozialisierte Verluste, privatisierte Gewinne — Verluste landen bei Retail/Pensionen (Liquiditäts-Mismatch, Gating), Manager-Gewinne sind längst realisiert, Bailouts retten Kapital. UMSTRITTEN: ein Crash kann konzentrierte Vermögen auch DEKONZENTRIEREN (Asset-Deflation trifft die Reichsten absolut am härtesten) → könnte DIST heben, wie die Kriegs-Gegenkante G→DIST.", me:"CAPTURE INSTANCE (not a new channel): socialized losses, privatized gains — losses land on retail/pensions (liquidity mismatch, gating), manager gains are long realized, bailouts rescue capital. CONTESTED: a crash can also DECONCENTRATE wealth (asset deflation hits the richest hardest in absolute terms) → could raise DIST, like the war counter-edge G→DIST."},

  // ---- V0.3: Einstiegsjob-Erosion / Karriereleiter-Bruch ----
  {f:"A", t:"ENT", conf:"belegt", pol:"+", src:"Dallas Fed 2026 (22–25J −13% in KI-exponiert); Revelio Labs (Einstiegs-Postings −35% seit 1/2023)", mech:"Junior-/Einstiegstätigkeiten sind kognitive Routine in Reinform → am codierbarsten → werden ZUERST automatisiert. Parallel zu A→B, aber Strom statt Bestand: nicht Verdrängung Etablierter, sondern blockierter Zustrom der jungen Kohorte.", me:"Junior/entry tasks are cognitive routine in its purest form → the most codifiable → automated FIRST. Parallel to A→B, but flow not stock: not displacement of incumbents but a blocked inflow of the young cohort."},
  {f:"ENT", t:"C", conf:"plausibel", pol:"+", mech:"Blockierter Berufseinstieg → Jugend-Arbeitslosigkeit/Unterbeschäftigung → Präkarisierung. Eigener Strom-Kanal in den Konvergenzknoten C, NICHT über B oder den Service-Pfad (Bs).", me:"Blocked career entry → youth unemployment/underemployment → precarization. A distinct flow channel into the convergence node C, NOT via B or the service path (Bs)."},
  {f:"ENT", t:"SOZ", conf:"plausibel", pol:"+", mech:"Füllt die „Perspektivlosigkeit“, die SOZ bereits listet, mit Ursache UND Kohorte: eine Generation ohne Eintritt ist der subjektive Kern der Perspektivlosigkeit — und speist über SOZ→D die Radikalisierung (Jugendarbeitslosigkeit als historischer Unruhe-Treiber).", me:"Fills the 'hopelessness' SOZ already lists with a cause AND a cohort: a generation without entry is the subjective core of hopelessness — and feeds radicalization via SOZ→D (youth unemployment as a historical driver of unrest)."},
  {f:"ENT", t:"Au", conf:"plausibel", pol:"-", mech:"LEITER-BRUCH: die knappen Aufsichtsrollen (Au) speisen sich aus Erfahrenen, und Erfahrung beginnt an der Einstiegssprosse. Keine Sprosse → dünnere Pipeline nach oben. Entwertet zugleich EDU/ADL — Reskilling ohne On-Ramp verpufft. ENT greift damit ZWEI helle Pfade an.", me:"LADDER BREAK: the scarce oversight roles (Au) draw on the experienced, and experience starts at the entry rung. No rung → a thinner pipeline upward. It also devalues EDU/ADL — reskilling without an on-ramp fizzles. ENT thus attacks TWO bright paths."},
  {f:"VAC", t:"ENT", conf:"umstritten", pol:"-", src:"NACE Job Outlook 2026; Klasse 2026 projiziert +5,6% (gemischt)", mech:"GEGENKRAFT (die sicherste helle Kraft der Karte): Arbeitskräfteknappheit kann Arbeitgeber zwingen, Junioren einzustellen und auszubilden → hält die Einstiegssprosse offen. UMSTRITTEN: Empirie gemischt — Klasse 2026 projiziert +5,6%, doch bisher gewinnt die Automatisierung der Sprosse („need the job to get the job“).", me:"COUNTERFORCE (the map's most certain bright force): labor scarcity can force employers to hire and train juniors → keeps the entry rung open. CONTESTED: evidence is mixed — class of 2026 projected +5.6%, yet so far the automation of the rung wins ('need the job to get the job')."},

  // ---- V0.4: Ökonomische Staatskunst — Subvention/Währung (MERC) & Ressourcen-Chokepoints (CHOKE) ----
  {f:"G", t:"MERC", conf:"belegt", pol:"+", src:"IMF 7/2025 + Okt-Update (Yuan −8,5%…−18%); Goldman 2026 (−25%); OECD Steel Subsidies; CER „China shock 2.0“", mech:"Machtpolitik + Staatskapitalismus → Subvention (OECD: Stahl 5× jeder andere), Überkapazität (30% Weltproduktion bei 13% Konsum) und Yuan-Unterbewertung als Wettbewerbswaffe.", me:"Power politics + state capitalism → subsidy (OECD: steel 5× any other), overcapacity (30% of world manufacturing at 13% of consumption) and yuan undervaluation as a competitive weapon."},
  {f:"MERC", t:"LK", conf:"plausibel", pol:"+", mech:"EXTERNER RIEGEL-TREIBER: gegen einen subventionierten, unterbewerteten Rivalen matcht kein nationaler Alleingang → die Antwort braucht Zoll/Koordination → der Standort-Riegel beißt härter. Was LK bisher nur intern (S2) hatte, kommt jetzt von außen.", me:"EXTERNAL LOCK DRIVER: against a subsidized, undervalued rival no national go-it-alone matches → the answer needs tariffs/coordination → the location lock bites harder. What LK had only internally (S2) now comes from outside."},
  {f:"MERC", t:"C", conf:"belegt", pol:"+", src:"Autor/Dorn/Hanson China Shock; CER 2026", mech:"Importschock deindustrialisiert handelbare Sektoren → Jobverlust, sinkende Lohnverhandlungsmacht → Präkarisierung. Der originale China-Schock als direkter C-Treiber (in MPWR fehlte er).", me:"Import shock deindustrializes tradable sectors → job loss, falling wage bargaining power → precarization. The original China shock as a direct C driver (it was missing in MPWR)."},
  {f:"MERC", t:"E", conf:"plausibel", pol:"+", mech:"Handelsschock → protektionistischer Backlash (Zölle, EU-Überkapazitäts-Instrument) → Druck zur Renationalisierung. Kann auch supranational kanalisiert werden (EU-Instrument → BLOC/T3) — beides läuft über denselben Schock.", me:"Trade shock → protectionist backlash (tariffs, EU overcapacity instrument) → pressure to renationalize. Can also be channeled supranationally (EU instrument → BLOC/T3) — both run off the same shock."},
  {f:"MERC", t:"SEC", conf:"umstritten", pol:"+", src:"Konsum- vs. Einkommens-Ungleichheit (H03)", mech:"DAS LECK (wie AUT→SEC): billige subventionierte Güter (Solar, EVs, Elektronik) heben den Konsum-/Gebrauchswert-Boden — der SEC-Boden steigt, selbst während dieselben Importe Jobs zerstören. Beidseitig, daher umstritten.", me:"THE LEAK (like AUT→SEC): cheap subsidized goods (solar, EVs, electronics) raise the consumption/use-value floor — the SEC floor rises even while the same imports destroy jobs. Two-sided, hence contested."},
  {f:"G", t:"CHOKE", conf:"belegt", pol:"+", src:"MOFCOM April 2025 (7 SE + Magnete, Ga/Ge/Graphit); CSIS 2026", mech:"Rückkehr der Machtpolitik → Weaponisierung der Lieferkette: Exportlizenzen auf seltene Erden und Magnete als Druckmittel.", me:"Return of power politics → weaponization of the supply chain: export licensing on rare earths and magnets as a coercive lever."},
  {f:"CHOKE", t:"AUT", conf:"plausibel", pol:"-", src:"CSIS 2026 (US-Magnete erst 2027–28)", mech:"DROSSEL (geopolitisches FIN): Automation, Robotik und Energiewende hängen an Magneten/Chips/Verarbeitung, die ein Rivale lizenziert → bremst den Überschuss-Motor an der Wurzel, bevor er verteilt werden kann.", me:"THROTTLE (geopolitical FIN): automation, robotics and the energy transition hang on magnets/chips/processing a rival licenses → it brakes the surplus engine at the root, before it can be distributed."},
  {f:"CHOKE", t:"T3", conf:"plausibel", pol:"-", mech:"Weaponisierte Interdependenz macht regelbasierte Koordination unmöglich — Hebel statt Regeln → senkt T3, wie ORD→T3. Überdeterminiert den Master-Schalter zusätzlich.", me:"Weaponized interdependence makes rule-based coordination impossible — leverage over rules → lowers T3, like ORD→T3. Further overdetermines the master switch."},
  {f:"CHOKE", t:"ORD", conf:"plausibel", pol:"+", mech:"Demonstrierter ökonomischer Zwang (Lizenz als Waffe) verfestigt die machtbasierte Ordnung — Stärke setzt sich durch, nicht Institutionen.", me:"Demonstrated economic coercion (the license as a weapon) entrenches the power-based order — strength prevails, not institutions."},
  {f:"CHOKE", t:"BLOC", conf:"umstritten", pol:"+", mech:"GEGEN-FORK: die Lieferdrohung kann europäische strategische Autonomie zünden (Critical Raw Materials Act, Friend-Shoring, Diversifizierung) — wie G→BLOC. Umstritten: kann ebenso national zersplittern.", me:"COUNTER-FORK: the supply threat can ignite European strategic autonomy (Critical Raw Materials Act, friend-shoring, diversification) — like G→BLOC. Contested: can equally splinter nationally."},

  // ---- V0.5: Digitale Fragilität (CYBER) — vierte Janus-Fläche von A, dritter Fragilitäts-Motor ----
  {f:"A", t:"CYBER", conf:"umstritten", pol:"+", src:"Anthropic Mythos Preview 4/2026; NSA Red-Team (Gen. Rudd 6/2026); CNAS Offense-Defense 2026", mech:"KI senkt Kosten und Skill der Cyber-Offensive drastisch (autonome Exploit-Entdeckung, skalierte „Flash-Attacks“) → Offense-Dominanz. UMSTRITTEN: dieselbe Fähigkeit treibt die Defensive (automatisiertes Patchen, Anomalie-Erkennung, Glasswing) — das Netto-Vorzeichen ist der Knackpunkt.", me:"AI drastically lowers the cost and skill of cyber-offense (autonomous exploit discovery, scaled 'flash attacks') → offense-dominance. CONTESTED: the same capability drives defense (automated patching, anomaly detection, Glasswing) — the net sign is the crux."},
  {f:"CYBER", t:"SEC", conf:"plausibel", pol:"-", mech:"MOTOR-SIGNATUR: angreifbare kritische Infrastruktur (Strom, Finanzen, Comms, Gesundheit) macht den Alltag unzuverlässig → senkt die wahrgenommene Sicherheit für alle, wie ECO/SOZ/FIN→SEC.", me:"ENGINE SIGNATURE: attackable critical infrastructure (power, finance, comms, health) makes daily life unreliable → lowers perceived security for everyone, like ECO/SOZ/FIN→SEC."},
  {f:"CYBER", t:"GROW", conf:"plausibel", pol:"-", mech:"Cyber-Schocks und „Flash-Attacks“ zerstören Kapital und stören Produktion/Lieferketten → bremsen das Wachstum (wie ECO→GROW, FIN→GROW).", me:"Cyber shocks and 'flash attacks' destroy capital and disrupt production/supply chains → brake growth (like ECO→GROW, FIN→GROW)."},
  {f:"CYBER", t:"AUT", conf:"plausibel", pol:"-", mech:"DROSSEL: Offense-Dominanz diskontiert den Automations-/Digital-Stack — die Automation, die du baust, kann gegen dich gedreht werden → der Überschuss-Motor läuft auf angreifbarer Schicht (digitaler Zwilling von CHOKE→AUT).", me:"THROTTLE: offense-dominance discounts the automation/digital stack — the automation you build can be turned against you → the surplus engine runs on an attackable layer (digital twin of CHOKE→AUT)."}
];

function findNodeQuery(raw){
  const q=String(raw||"").trim().toLowerCase();
  if(!q) return "";
  if(NODES[q.toUpperCase()]) return q.toUpperCase();
  const entries=Object.entries(NODES);
  const exact=entries.find(([id,n])=>id.toLowerCase()===q||NL(n).toLowerCase()===q);
  if(exact) return exact[0];
  const prefix=entries.find(([id,n])=>id.toLowerCase().startsWith(q)||NL(n).toLowerCase().startsWith(q));
  if(prefix) return prefix[0];
  const partial=entries.find(([id,n])=>id.toLowerCase().includes(q)||NL(n).toLowerCase().includes(q));
  return partial?partial[0]:"";
}

function edgeIndexByPair(f,t){return EDGES.findIndex(e=>e.f===f&&e.t===t);}
function loopSets(loop){
  const nodes=new Set(), edges=new Set();
  loop.edges.forEach(([f,t])=>{
    const ei=edgeIndexByPair(f,t);
    if(ei>-1){edges.add(ei);nodes.add(f);nodes.add(t);}
  });
  return {nodes,edges};
}

function traceSets(id,direction){
  const nodes=new Set([id]), edges=new Set(), visited=new Set([id]), queue=[id];
  while(queue.length){
    const current=queue.shift();
    EDGES.forEach((edge,ei)=>{
      const follows=direction==="downstream"?edge.f===current:edge.t===current;
      if(!follows) return;
      const next=direction==="downstream"?edge.t:edge.f;
      edges.add(ei);
      nodes.add(next);
      if(!visited.has(next)){
        visited.add(next);
        queue.push(next);
      }
    });
  }
  return {nodes,edges};
}
function distSimResult(mode){
  const data=new Map([["DIST",{depth:0,signs:new Set([mode])}]]);
  const queue=[{id:"DIST",sign:mode,depth:0}], edges=new Set();
  while(queue.length){
    const current=queue.shift();
    const currentData=data.get(current.id);
    if(!currentData||currentData.depth!==current.depth) continue;
    EDGES.forEach((edge,ei)=>{
      if(edge.f!==current.id) return;
      edges.add(ei);
      const nextDepth=current.depth+1;
      const nextSign=current.sign*(edge.pol==="+"?1:-1);
      const nextData=data.get(edge.t);
      if(!nextData){
        data.set(edge.t,{depth:nextDepth,signs:new Set([nextSign])});
        queue.push({id:edge.t,sign:nextSign,depth:nextDepth});
      } else if(nextData.depth===nextDepth&&!nextData.signs.has(nextSign)){
        nextData.signs.add(nextSign);
        queue.push({id:edge.t,sign:nextSign,depth:nextDepth});
      }
    });
  }
  const nodes=new Set(data.keys()), state={}, counts={good:0,bad:0,conflict:0};
  data.forEach((entry,id)=>{
    if(entry.signs.size>1){
      state[id]="conflict"; counts.conflict+=1; return;
    }
    const signal=[...entry.signs][0];
    const valence=SIM_VALENCE[id]||1;
    const qualitative=signal*valence;
    state[id]=qualitative>=0?"good":"bad";
    counts[state[id]]+=1;
  });
  return {mode,nodes,edges,state,counts};
}

function graphBounds(){

  }
  return {minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY};
}

    outs.forEach(e=>h+=edgeLine(e,NL(NODES[e.t])));h+=`</div>`;}
  if(ins.length){h+=`<div class="row"><div class="k">${U.caused}</div>`;
    ins.forEach(e=>h+=edgeLine(e,NL(NODES[e.f]),true));h+=`</div>`;}
  document.getElementById("detail").innerHTML=h;
}
function showEdge(e,ei=edgeIndex(e)){
  focusEdge(e,ei);
  const U=UI[LANG];
  let h=`<div class="title">${NL(NODES[e.f])} → ${NL(NODES[e.t])}</div>`;
  h+=`<span class="tag" style="background:${CONFHEX[e.conf]}33;color:${CONFHEX[e.conf]}">${U.conf}: ${CONFLABEL[LANG][e.conf]}</span>`;
  h+=`<span class="tag" style="background:#222732;color:#cdd2da">${polLabel(e)}</span>`;
  h+=`<div class="row"><div class="k">${U.mechh}</div><span class="mech">${EM(e)}</span></div>`;
  if(e.src) h+=`<div class="row"><div class="k">${U.beleg}</div>${linkify(e.src)}</div>`;
  document.getElementById("detail").innerHTML=h;
}
function polLabel(e){const T=POLTXT[LANG];return (e.pol==="+"?T.p:T.m)+(e.loop?T.loop:"");}
function edgeLine(e,other,incoming){
  const arrow=incoming?"← ":"→ ", m=EM(e);
  return `<div style="margin:5px 0;cursor:pointer" onclick='__se(${JSON.stringify(JSON.stringify(e))})'>
    <span style="color:${CONFHEX[e.conf]}">${e.pol==="+"?"＋":"－"}</span> ${arrow}${other}
    <div class="mech" style="color:var(--muted);font-size:11.5px;margin:2px 0 0 14px">${m.slice(0,90)}${m.length>90?"…":""}</div>
    ${e.src?`<div style="color:#6f9a6f;font-size:10.5px;margin:2px 0 0 14px">📎 ${linkify(e.src)}</div>`:""}</div>`;
}
function parseEdgePayload(s){
  const parsed=typeof s==="string"?JSON.parse(s):s;
  return typeof parsed==="string"?JSON.parse(parsed):parsed;
}
window.__se=s=>showEdge(parseEdgePayload(s));
function clearDetail(){
  clearHighlight();
  document.getElementById("detail").innerHTML=
  `<div class="empty">${UI[LANG].empty}</div><div class="hint">${UI[LANG].hint}</div>`;
}

function render(){
  document.documentElement.lang=LANG;
  document.getElementById("subtitle").innerHTML=UI[LANG].sub;
  document.getElementById("detailHead").textContent=UI[LANG].detail;
  document.getElementById("legend").innerHTML=legendHTML();
  document.getElementById("langbtn").textContent=LANG==="de"?"EN":"DE";
  renderMapTools(); renderFilters(); drawEdges(); drawNodes(); renderMinimap(); applyFilters(); clearDetail();
}
function toggleLang(){LANG=LANG==="de"?"en":"de";render();}

// pan & zoom
function apply(){
  gRoot.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);
  updateMinimap();
}
let drag=null;
filtersEl.addEventListener("click",e=>e.stopPropagation());
filtersEl.addEventListener("mousedown",e=>e.stopPropagation());
filtersEl.addEventListener("wheel",e=>e.stopPropagation(),{passive:true});
mapToolsEl.addEventListener("click",e=>e.stopPropagation());
mapToolsEl.addEventListener("mousedown",e=>e.stopPropagation());
mapToolsEl.addEventListener("wheel",e=>e.stopPropagation(),{passive:true});
minimapSvg.addEventListener("click",e=>e.stopPropagation());
minimapSvg.addEventListener("mousedown",e=>e.stopPropagation());
minimapSvg.addEventListener("wheel",e=>e.stopPropagation(),{passive:true});
stage.addEventListener("mousedown",e=>{drag={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y};stage.classList.add("drag");});
window.addEventListener("mousemove",e=>{if(!drag)return;view.x=drag.vx+(e.clientX-drag.x);view.y=drag.vy+(e.clientY-drag.y);apply();});
window.addEventListener("mouseup",()=>{drag=null;stage.classList.remove("drag");});
stage.addEventListener("wheel",e=>{e.preventDefault();
  const r=stage.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.1:0.9,nk=Math.max(.3,Math.min(2.4,view.k*f));
  view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;apply();
},{passive:false});
stage.addEventListener("click",()=>clearDetail());

render();
fit();
</script>
</body>
</html>
